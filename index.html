            {"id":308,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Flight Telemetry Data';","o":["Η μπαταρία","Όλα τα δεδομένα πτήσης που βλέπουμε στην οθόνη","Το RTH","Η κάμερα"],"a":1},
            {"id":309,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι κάνουμε αν το drone 'βγάλει' σφάλμα πυξίδας;","o":["Συνεχίζουμε","Προσγειώνουμε και κάνουμε βαθμονόμηση (calibration)","Τίποτα","Κλείνουμε την οθόνη"],"a":1},
            {"id":310,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Propeller Guard Remove';","o":["Αλλαγή ελίκων","Η αφαίρεση των προστατευτικών για πτήση σε ανοικτό χώρο","Η μπαταρία","Το GPS"],"a":1}
        ];

        let currentIndex = 0;
        let userAnswers = new Array(data.length).fill(null);

        function init() {
            renderDots();
            updateUI();
        }

        function renderDots() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            data.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = `dot-${i}`;
                dot.innerText = i + 1;
                dot.onclick = () => { currentIndex = i; updateUI(); };
                grid.appendChild(dot);
            });
        }

        function updateUI() {
            const q = data[currentIndex];
            document.getElementById('cat').innerText = q.c;
            document.getElementById('qtext').innerText = q.q;
            document.getElementById('stat').innerText = `ΕΡΩΤΗΣΗ ${currentIndex + 1} / ${data.length}`;
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            q.o.forEach((optText, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt';
                if (userAnswers[currentIndex] !== null) btn.style.pointerEvents = 'none';

                if (userAnswers[currentIndex] !== null) {
                    if (i === q.a) btn.classList.add('correct');
                    else if (i === userAnswers[currentIndex]) btn.classList.add('wrong');
                }

                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-[10px] font-black border border-slate-700 text-slate-400">
                        ${['Α','Β','Γ','Δ'][i]}
                    </div>
                    <div class="flex-1">${optText}</div>
                `;
                
                btn.onclick = () => {
                    if (userAnswers[currentIndex] === null) {
                        userAnswers[currentIndex] = i;
                        const dot = document.getElementById(`dot-${currentIndex}`);
                        dot.classList.add(i === q.a ? 'ok' : 'err');
                        updateUI();
                    }
                };
                container.appendChild(btn);
            });

            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            const activeDot = document.getElementById(`dot-${currentIndex}`);
            activeDot.classList.add('active');
            activeDot.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function nQ() { if (currentIndex < data.length - 1) { currentIndex++; updateUI(); } }
        function pQ() { if (currentIndex > 0) { currentIndex--; updateUI(); } }

        init();
    </script>
