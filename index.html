<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Drone Exam Trainer</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

#home{
margin-top:120px;
}

select,button{
padding:12px;
font-size:18px;
margin:10px;
}

#toolbar{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
background:#222;
color:white;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
z-index:100;
}

#toolbar button{
margin-right:10px;
padding:8px 14px;
font-size:16px;
}

#timer{
font-weight:bold;
margin-left:20px;
}

#quiz{
margin-top:80px;
}

</style>

</head>

<body>

<div id="toolbar">

<button onclick="goHome()">🏠 Menu</button> <button onclick="restartExam()">🔄 Restart</button>

<span id="timer">⏱ 0:00</span>

</div>

<div id="home">

<h1>Drone Exam Trainer</h1>

<br>

<select id="categorySelect">
<option value="Air Law">Air Law</option>
<option value="Meteorology">Meteorology</option>
<option value="Human Performance">Human Performance</option>
<option value="Operational Procedures">Operational Procedures</option>
</select>

<br>

<select id="questionAmount">
<option value="5">5 Questions</option>
<option value="10">10 Questions</option>
<option value="all">All Questions</option>
</select>

<br>

<button onclick="startStudy()">Start Study</button>

</div>

<div id="quiz"></div>

<script>

let allQuestions=[

{
category:"Air Law",
question:"Πόσο ψηλά επιτρέπεται να πετάει ένα drone;",
answers:["50m","120m","300m","500m"],
correct:1,
explanation:"Το μέγιστο επιτρεπόμενο ύψος είναι 120m."
},

{
category:"Air Law",
question:"Μπορεί drone να πετάξει πάνω από πλήθος;",
answers:["Ναι","Όχι","Μόνο με άδεια","Μόνο χαμηλά"],
correct:1,
explanation:"Η πτήση πάνω από πλήθος απαγορεύεται."
},

{
category:"Human Performance",
question:"Ποιος είναι υπεύθυνος για την πτήση;",
answers:["Κατασκευαστής","Πιλότος","Αστυνομία","Δήμος"],
correct:1,
explanation:"Ο pilot είναι υπεύθυνος για την πτήση."
},

{
category:"Operational Procedures",
question:"Πρέπει να υπάρχει οπτική επαφή με το drone;",
answers:["Ναι πάντα","Όχι","Μόνο τη νύχτα","Μόνο σε πόλη"],
correct:0,
explanation:"Ο χειριστής πρέπει να διατηρεί VLOS."
}

];

let questions=[];
let wrongQuestions=[];
let currentQuestion=0;
let userAnswers=[];
let marked=[];
let startTime;
let timerInterval;
let examFinished=false;

function startStudy(){

document.getElementById("toolbar").style.display="block";

let category=document.getElementById("categorySelect").value;
let amount=document.getElementById("questionAmount").value;

let filtered=allQuestions.filter(q=>q.category===category);

shuffle(filtered);

if(amount==="all"){
questions=filtered;
}else{
questions=filtered.slice(0,Number(amount));
}

initExam();

}

function goHome(){

location.reload();

}

function restartExam(){

if(confirm("Restart the study session?")){
initExam();
}

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];

}

}

function initExam(){

document.getElementById("home").style.display="none";

currentQuestion=0;
userAnswers=new Array(questions.length).fill(null);
marked=new Array(questions.length).fill(false);

startTime=Date.now();
clearInterval(timerInterval);
timerInterval=setInterval(updateTimer,1000);

examFinished=false;

render();

}

function updateTimer(){

let seconds=Math.floor((Date.now()-startTime)/1000);

let min=Math.floor(seconds/60);
let sec=seconds%60;

document.getElementById("timer").innerHTML="⏱ "+min+":"+sec.toString().padStart(2,"0");

}

function render(){

showQuestion();
showGrid();
checkAutoFinish();

}

function showQuestion(){

let q=questions[currentQuestion];

let progress=Math.round(((currentQuestion+1)/questions.length)*100);

let html=`

<div style="width:60%;margin:auto;background:white;padding:20px;border-radius:10px">

<h3>Question ${currentQuestion+1} / ${questions.length}</h3>

<div style="width:100%;background:#ddd;border-radius:10px;overflow:hidden;margin-bottom:20px">
<div style="width:${progress}%;background:#4caf50;height:16px"></div>
</div>

<p style="font-size:22px">${q.question}</p>
`;

q.answers.forEach((a,i)=>{

let color="";

if(userAnswers[currentQuestion]!==null){

if(i===q.correct) color="background:#9cff9c";

if(i===userAnswers[currentQuestion] && i!==q.correct)
color="background:#ff8f8f";

}

html+=`
<button onclick="answer(${i})"
style="display:block;margin:10px auto;padding:15px;width:320px;font-size:18px;${color}">
${a}
</button>
`;

});

if(userAnswers[currentQuestion]!==null && userAnswers[currentQuestion]!==q.correct){

html+=`
<div style="margin-top:20px;padding:15px;background:#f4f4f4;border-radius:8px">
<b>Explanation:</b><br>
${q.explanation}
</div>
`;

}

html+=`

<br>

<button onclick="prev()" style="padding:14px 24px;font-size:20px;margin:6px">Previous</button>

<button onclick="next()" style="padding:14px 24px;font-size:20px;margin:6px">Next</button>

<button onclick="mark()" style="padding:14px 24px;font-size:20px;margin:6px">Mark</button>

<button onclick="finishExam()" style="padding:14px 24px;font-size:20px;margin:6px;background:#444;color:white">Finish</button>

</div>
`;

document.getElementById("quiz").innerHTML=html;

}

function showGrid(){

let grid=`<div style="position:absolute;top:100px;right:20px;background:white;padding:12px;border-radius:10px">`;

questions.forEach((q,i)=>{

let color="white";

if(userAnswers[i]!==null){

if(userAnswers[i]===questions[i].correct)
color="#9cff9c";
else
color="#ff8f8f";

}

let markBadge="";

if(marked[i]){

markBadge=`<span style="position:absolute;top:-6px;right:-6px;background:yellow;font-weight:bold;padding:2px 6px;border-radius:50%">!</span>`;

}

grid+=`

<div style="position:relative;display:inline-block">

<button onclick="goto(${i})"
style="width:38px;height:38px;margin:3px;background:${color}">
${i+1}
</button>

${markBadge}

</div>
`;

});

grid+="</div>";

document.getElementById("quiz").innerHTML+=grid;

}

function answer(i){

if(userAnswers[currentQuestion]!==null) return;

userAnswers[currentQuestion]=i;

render();

if(i===questions[currentQuestion].correct){

setTimeout(()=>{

if(currentQuestion<questions.length-1){
currentQuestion++;
render();
}

},600);

}

}

function next(){

if(currentQuestion<questions.length-1){
currentQuestion++;
render();
}

}

function prev(){

if(currentQuestion>0){
currentQuestion--;
render();
}

}

function goto(i){

currentQuestion=i;
render();

}

function mark(){

marked[currentQuestion]=!marked[currentQuestion];
render();

}

function checkAutoFinish(){

if(examFinished) return;

let allAnswered=userAnswers.every(a=>a!==null);

if(allAnswered){

examFinished=true;

setTimeout(()=>{

if(confirm("All questions answered. Finish exam?")){
showResults();
}else{
examFinished=false;
}

},300);

}

}

function finishExam(){

let unanswered=userAnswers.includes(null);

if(unanswered){

if(!confirm("You still have unanswered questions. Finish anyway?")) return;

}

showResults();

}

function showResults(){

clearInterval(timerInterval);

let correct=0;
wrongQuestions=[];

questions.forEach((q,i)=>{

if(userAnswers[i]===q.correct){
correct++;
}else{
wrongQuestions.push(i);
}

});

let percent=Math.round((correct/questions.length)*100);

document.getElementById("quiz").innerHTML=`

<div style="width:50%;margin:auto;background:white;padding:30px;border-radius:10px">

<h2>Results</h2>

<p>Correct answers: ${correct} / ${questions.length}</p>

<p>Score: ${percent}%</p>

<h3>${percent>=75?"PASS":"FAIL"}</h3>

<br>

<button onclick="location.reload()" style="padding:14px 25px;font-size:18px;margin:8px">
Restart
</button>

</div>
`;

}

</script>

</body>
</html>
