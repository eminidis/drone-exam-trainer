<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Drone Exam Trainer</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("background.jpg") center/cover no-repeat fixed;
color:white;
}

/* overlay */

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
padding:30px;
display:flex;
}

/* LIGHT MODE */

body.light .overlay{
background:rgba(255,255,255,0.6);
color:black;
}

/* DARK MODE */

body.dark .overlay{
background:rgba(0,0,0,0.65);
color:white;
}

.main{
flex:1;
padding-right:40px;
}

.gridContainer{
width:220px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.lang{
position:absolute;
top:20px;
right:30px;
}

.theme{
position:absolute;
bottom:20px;
left:30px;
}

button{
cursor:pointer;
}

.timer{
font-size:18px;
}

.question{
font-size:22px;
margin-bottom:25px;
}

.answers button{
display:block;
width:100%;
margin-bottom:10px;
padding:14px;
border:none;
border-radius:6px;
font-size:16px;
background:#333;
color:white;
}

.correct{background:#2ecc71!important;}
.wrong{background:#e74c3c!important;}

.explanation{
margin-top:15px;
padding:15px;
background:#222;
border-left:4px solid orange;
display:none;
}

.controls{
margin-top:20px;
}

.controls button{
padding:14px 22px;
font-size:16px;
border:none;
border-radius:8px;
margin-right:6px;
}

.navBtn{background:#555;color:white}
.menuBtn{background:#3498db;color:white}
.finishBtn{background:#e74c3c;color:white}

.grid{
display:grid;
grid-template-columns:repeat(5,40px);
gap:6px;
}

.grid div{
width:40px;
height:40px;
background:#555;
display:flex;
align-items:center;
justify-content:center;
border-radius:5px;
cursor:pointer;
}

.green{background:#2ecc71!important;}
.red{background:#e74c3c!important;}

.marked::after{
content:"!";
color:yellow;
font-weight:bold;
}

</style>
</head>

<body class="dark">

<div id="app"></div>

<script>

let language="gr"

const questions={

gr:[
{
q:"Τι σημαίνει VLOS;",
a:["Visual Line of Sight","Vision Link","Video Line","Visual Lock"],
correct:0,
exp:"VLOS σημαίνει ότι ο χειριστής πρέπει να βλέπει το drone με γυμνό μάτι."
}
],

en:[
{
q:"What does VLOS mean?",
a:["Visual Line of Sight","Vision Link","Video Line","Visual Lock"],
correct:0,
exp:"VLOS means the pilot must keep the drone in visual line of sight."
}
]

}

let current=0
let answers=[]
let marked=[]
let startTime
let timerInterval

renderMenu()

function renderMenu(){

document.getElementById("app").innerHTML=`

<div class="lang">
<button onclick="setLang('gr')">Ελληνικά</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="theme">
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('light')">Light</button>
</div>

<div class="overlay">

<div class="main">

<h1>Drone Exam Trainer</h1>

<div style="text-align:center">

<button onclick="startStudy()" style="padding:16px 28px;font-size:18px">Έναρξη Μελέτης</button>

</div>

</div>

</div>

`

}

function setLang(l){

language=l
renderMenu()

}

function setTheme(t){

document.body.className=t

}

function startStudy(){

startTime=Date.now()

document.getElementById("app").innerHTML=`

<div class="overlay">

<div class="main">

<div class="topbar">

<button class="menuBtn" onclick="renderMenu()">Μενού</button>

<div class="timer" id="timer">00:00</div>

</div>

<div class="question" id="question"></div>

<div class="answers" id="answers"></div>

<div id="explanation" class="explanation"></div>

<div class="controls">

<button class="navBtn" onclick="prev()">Προηγούμενη</button>
<button class="navBtn" onclick="next()">Επόμενη</button>
<button class="navBtn" onclick="mark()">Σημείωση</button>
<button class="finishBtn" onclick="finish()">Τερματισμός</button>

</div>

</div>

<div class="gridContainer">

<div class="grid" id="grid"></div>

</div>

</div>

`

render()
startTimer()

}

function render(){

let q=questions[language][current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let answersDiv=document.getElementById("answers")
answersDiv.innerHTML=""

q.a.forEach((ans,i)=>{

let btn=document.createElement("button")
btn.innerText=ans

btn.onclick=()=>answer(i,btn)

answersDiv.appendChild(btn)

})

document.getElementById("explanation").style.display="none"

renderGrid()

}

function answer(i,btn){

if(answers[current]!=undefined)return

answers[current]=i

if(i==questions[language][current].correct){

btn.classList.add("correct")
setTimeout(()=>next(),600)

}else{

btn.classList.add("wrong")

let exp=document.getElementById("explanation")
exp.style.display="block"
exp.innerText="Επεξήγηση: "+questions[language][current].exp

}

renderGrid()

}

function next(){

if(current<questions[language].length-1){
current++
render()
}

}

function prev(){

if(current>0){
current--
render()
}

}

function mark(){

if(!marked.includes(current)){
marked.push(current)
}else{
marked=marked.filter(x=>x!=current)
}

renderGrid()

}

function renderGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

questions[language].forEach((q,i)=>{

let box=document.createElement("div")
box.innerText=i+1

if(answers[i]!=undefined){

if(answers[i]==q.correct){
box.classList.add("green")
}else{
box.classList.add("red")
}

}

if(marked.includes(i)){
box.classList.add("marked")
}

box.onclick=()=>{
current=i
render()
}

grid.appendChild(box)

})

}

function startTimer(){

timerInterval=setInterval(()=>{

let sec=Math.floor((Date.now()-startTime)/1000)
let m=Math.floor(sec/60)
let s=sec%60

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

},1000)

}

function finish(){

clearInterval(timerInterval)

let correct=0

answers.forEach((a,i)=>{
if(a==questions[language][i].correct)correct++
})

let wrong=answers.length-correct

let time=document.getElementById("timer").innerText

document.getElementById("app").innerHTML=`

<div class="overlay">

<div class="main">

<h1>Αποτελέσματα</h1>

<div style="font-size:22px">

Σωστές: ${correct}<br><br>
Λάθος: ${wrong}<br><br>
Χρόνος: ${time}<br><br>

<button onclick="renderMenu()" style="padding:14px 24px">Μενού</button>

</div>

</div>

</div>

`

}

</script>

</body>
</html>
