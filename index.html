            {"id":310,"c":"ΑΣΦΑΛΕΙΑ","q":"Ποιος είναι ο χρυσός κανόνας;","o":["Πετάμε όσο πιο μακριά γίνεται","Η ασφάλεια των ανθρώπων στο έδαφος και στον αέρα είναι πάντα η προτεραιότητα","Να βγάζουμε τέλεια βίντεο","Να πηγαίνουμε γρήγορα"],"a":1}
        ];

        // --- ΣΥΝΑΡΤΗΣΕΙΣ ΛΕΙΤΟΥΡΓΙΑΣ ---
        let currentIndex = 0;
        let userAnswers = new Array(data.length).fill(null);

        function init() {
            renderDots();
            updateUI();
        }

        function renderDots() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            data.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = `dot-${i}`;
                dot.innerText = i + 1;
                dot.onclick = () => { currentIndex = i; updateUI(); };
                grid.appendChild(dot);
            });
        }

        function updateUI() {
            const q = data[currentIndex];
            document.getElementById('cat').innerText = q.c;
            document.getElementById('qtext').innerText = q.q;
            document.getElementById('stat').innerText = `Πρόοδος: ${currentIndex + 1} / ${data.length}`;
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            q.o.forEach((optText, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt';
                
                if (userAnswers[currentIndex] !== null) {
                    if (i === q.a) btn.classList.add('correct');
                    else if (i === userAnswers[currentIndex]) btn.classList.add('wrong');
                }

                btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-[10px] font-black">${['Α','Β','Γ','Δ'][i]}</span> ${optText}`;
                btn.onclick = () => {
                    if (userAnswers[currentIndex] === null) {
                        userAnswers[currentIndex] = i;
                        const dot = document.getElementById(`dot-${currentIndex}`);
                        dot.classList.add(i === q.a ? 'ok' : 'err');
                        updateUI();
                    }
                };
                container.appendChild(btn);
            });

            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${currentIndex}`).classList.add('active');
            document.getElementById(`dot-${currentIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function nQ() { if (currentIndex < data.length - 1) { currentIndex++; updateUI(); } }
        function pQ() { if (currentIndex > 0) { currentIndex--; updateUI(); } }

        init();
    </script>
