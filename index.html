document.getElementById('main-content').innerHTML = htmlStructure;
let currentQuestions = [], currentIndex = 0, score = 0, timerInterval, isStudyMode = false, answersStatus = [];

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function startStudy() {
    const category = document.getElementById('category-select').value;
    const count = parseInt(document.getElementById('question-count').value);
    isStudyMode = true;
    let filtered = category === 'ALL' ? [...allQuestions] : allQuestions.filter(q => q.c === category);
    currentQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, Math.min(count, filtered.length));
    initQuiz();
}

function startExam() {
    isStudyMode = false;
    currentQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 40);
    initQuiz();
    startTimer(60 * 60);
}

function initQuiz() {
    currentIndex = 0; score = 0;
    answersStatus = new Array(currentQuestions.length).fill(null);
    showSection('quiz');
    renderGrid();
    displayQuestion();
    updateLiveScore();
}

function displayQuestion() {
    const q = currentQuestions[currentIndex];
    document.getElementById('q-cat').innerText = q.c;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('q-progress-text').innerText = `Ερώτηση ${currentIndex + 1} από ${currentQuestions.length}`;
    const optionsContainer = document.getElementById('q-options');
    optionsContainer.innerHTML = '';
    q.o.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn font-bold';
        btn.innerText = opt;
        if (answersStatus[currentIndex] !== null) {
            btn.disabled = true;
            if (index === q.a) btn.classList.add('option-correct');
            if (answersStatus[currentIndex] === index && index !== q.a) btn.classList.add('option-wrong');
        } else { btn.onclick = () => handleAnswer(index, btn); }
        optionsContainer.appendChild(btn);
    });
    const exp = document.getElementById('q-explanation');
    if (answersStatus[currentIndex] !== null && answersStatus[currentIndex] !== q.a) {
        document.getElementById('explanation-text').innerText = q.e;
        exp.classList.remove('hidden');
    } else { exp.classList.add('hidden'); }
    updateGridUI();
}

function handleAnswer(selectedIndex, btn) {
    const q = currentQuestions[currentIndex];
    answersStatus[currentIndex] = selectedIndex;
    if (selectedIndex === q.a) { btn.classList.add('option-correct'); score++; updateLiveScore(); setTimeout(nextQuestion, 600); }
    else { btn.classList.add('option-wrong'); document.getElementById('explanation-text').innerText = q.e; document.getElementById('q-explanation').classList.remove('hidden'); }
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    updateGridUI();
}

function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) { currentIndex++; displayQuestion(); }
    else { finishQuiz(); }
}

function prevQuestion() { if (currentIndex > 0) { currentIndex--; displayQuestion(); } }

function renderGrid() {
    const grid = document.getElementById('progress-grid');
    grid.innerHTML = '';
    currentQuestions.forEach((_, i) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.innerText = i + 1;
        item.onclick = () => { currentIndex = i; displayQuestion(); };
        grid.appendChild(item);
    });
}

function updateGridUI() {
    const items = document.querySelectorAll('.grid-item');
    items.forEach((item, i) => {
        item.classList.remove('current', 'correct', 'wrong');
        if (i === currentIndex) item.classList.add('current');
        if (answersStatus[i] !== null) {
            if (answersStatus[i] === currentQuestions[i].a) item.classList.add('correct');
            else item.classList.add('wrong');
        }
    });
}

function updateLiveScore() {
    const percent = Math.round((score / currentQuestions.length) * 100);
    document.getElementById('live-score').innerText = `${percent}%`;
}

function startTimer(seconds) {
    const timerElement = document.getElementById('timer');
    let timeLeft = seconds;
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerElement.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
        timeLeft--;
    }, 1000);
}

function finishQuiz() {
    clearInterval(timerInterval);
    showSection('results');
    const percent = Math.round((score / currentQuestions.length) * 100);
    document.getElementById('result-score').innerText = `${percent}%`;
    document.getElementById('result-stats').innerText = `ΣΩΣΤΕΣ: ${score} / ΣΥΝΟΛΟ: ${currentQuestions.length}`;
    const badge = document.getElementById('result-badge');
    badge.innerText = percent >= 75 ? "ΕΠΙΤΥΧΙΑ" : "ΑΠΟΤΥΧΙΑ";
    badge.className = `inline-block px-8 py-2 rounded-full text-[10px] font-black mb-4 uppercase tracking-[0.2em] ${percent >= 75 ? 'bg-emerald-500' : 'bg-rose-500'}`;
}

showSection('home');
</script>
