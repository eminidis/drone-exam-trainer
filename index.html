<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .option-btn { width: 100%; text-align: left; padding: 1rem; margin-bottom: 0.5rem; border-radius: 0.75rem; background: rgba(51, 65, 85, 0.5); border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; display: flex; align-items: center; cursor: pointer; }
        .option-btn:hover { background: rgba(51, 65, 85, 0.8); }
        .option-btn.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .correct-choice { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        .wrong-choice { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .dot { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { border-color: #3b82f6; color: #3b82f6; border-width: 2px; }
        .dot.answered { background: #3b82f6; color: white; border-color: #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <main id="start-screen" class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-card rounded-3xl p-8 text-center shadow-2xl">
            <h1 class="text-4xl font-extrabold mb-2 uppercase text-blue-500">Drone Exam</h1>
            <h2 class="text-lg font-bold mb-8 text-slate-400">Προετοιμασία 310 Ερωτήσεων</h2>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Ενότητα</label>
                    <select id="categorySelect" class="w-full bg-slate-800 border border-white/10 p-4 rounded-xl font-bold text-white">
                        <option value="all">Όλες οι Ενότητες</option>
                        <option value="Α) ΑΣΦΑΛΕΙΑ ΠΤΗΣΕΩΝ ΣμηΕΑ">Α) ΑΣΦΑΛΕΙΑ ΠΤΗΣΕΩΝ ΣμηΕΑ</option>
                        <option value="Β) ΠΕΡΙΟΡΙΣΜΟΙ ΕΝΑΕΡΙΟΥ ΧΩΡΟΥ">Β) ΠΕΡΙΟΡΙΣΜΟΙ ΕΝΑΕΡΙΟΥ ΧΩΡΟΥ</option>
                        <option value="Γ) ΑΕΡΟΠΟΡΙΚΟΙ ΚΑΝΟΝΙΣΜΟΙ">Γ) ΑΕΡΟΠΟΡΙΚΟΙ ΚΑΝΟΝΙΣΜΟΙ</option>
                        <option value="Δ) ΓΕΝΙΚΕΣ ΓΝΩΣΕΙΣ ΣμηΕΑ">Δ) ΓΕΝΙΚΕΣ ΓΝΩΣΕΙΣ ΣμηΕΑ</option>
                        <option value="Ε) ΙΔΙΩΤΙΚΟΤΗΤΑ ΚΑΙ ΠΡΟΣΤΑΣΙΑ ΔΕΔΟΜΕΝΩΝ">Ε) ΙΔΙΩΤΙΚΟΤΗΤΑ ΚΑΙ ΠΡΟΣΤΑΣΙΑ ΔΕΔΟΜΕΝΩΝ</option>
                        <option value="ΣΤ) ΑΣΦΑΛΙΣΗ">ΣΤ) ΑΣΦΑΛΙΣΗ</option>
                        <option value="Ζ) ΑΝΘΡΩΠΙΝΗ ΑΠΟΔΟΣΗ ΚΑΙ ΠΕΡΙΟΡΙΣΜΟΙ">Ζ) ΑΝΘΡΩΠΙΝΗ ΑΠΟΔΟΣΗ ΚΑΙ ΠΕΡΙΟΡΙΣΜΟΙ</option>
                        <option value="Η) ΓΕΝΙΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ ΜΕΤΡΙΑΣΜΟΥ ΚΙΝΔΥΝΩΝ">Η) ΓΕΝΙΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ ΜΕΤΡΙΑΣΜΟΥ ΚΙΝΔΥΝΩΝ</option>
                        <option value="Θ) ΜΕΤΕΩΡΟΛΟΓΙΑ">Θ) ΜΕΤΕΩΡΟΛΟΓΙΑ</option>
                        <option value="Ι) ΠΤΗΣΙΚΕΣ ΕΠΙΔΟΣΕΙΣ ΣμηΕΑ">Ι) ΠΤΗΣΙΚΕΣ ΕΠΙΔΟΣΕΙΣ ΣμηΕΑ</option>
                        <option value="Κ) ΤΕΧΝΙΚΟΙ ΚΑΙ ΛΕΙΤΟΥΡΓΙΚΟΙ ΜΕΤΡΙΑΣΜΟΙ ΚΙΝΔΥΝΩΝ">Κ) ΤΕΧΝΙΚΟΙ ΚΑΙ ΛΕΙΤΟΥΡΓΙΚΟΙ ΜΕΤΡΙΑΣΜΟΙ ΚΙΝΔΥΝΩΝ</option>
                    </select>
                </div>
                <div class="pt-4 space-y-3">
                    <button onclick="startStudy()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white uppercase">Study Mode</button>
                    <button onclick="startExam()" class="w-full py-4 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white uppercase">Exam Mode</button>
                </div>
            </div>
        </div>
    </main>

    <main id="quiz-screen" class="hidden flex-1 flex flex-col p-4 max-w-4xl mx-auto w-full">
        <div class="flex justify-between items-center mb-6">
            <span id="q-counter" class="text-2xl font-black text-white">1 / 0</span>
            <div id="active-timer" class="hidden text-2xl font-mono bg-rose-500/20 text-rose-500 px-4 py-2 rounded-xl">45:00</div>
        </div>
        <div class="glass-card rounded-3xl p-6 mb-6">
            <p id="q-text" class="text-xl font-semibold mb-6 text-white leading-snug">Φόρτωση...</p>
            <div id="options-container" class="space-y-3"></div>
            <div id="exp-text" class="hidden mt-4 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-400 font-bold"></div>
        </div>
        <div id="dot-grid" class="flex flex-wrap gap-2 mb-6 justify-center"></div>
        <div class="mt-auto flex gap-3">
            <button onclick="prevQ()" class="flex-1 py-4 bg-slate-800 rounded-xl font-bold text-white">ΠΙΣΩ</button>
            <button onclick="nextQ()" class="flex-1 py-4 bg-blue-600 rounded-xl font-bold text-white">ΕΠΟΜΕΝΟ</button>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
