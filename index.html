<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .grid-dot { width: 35px; height: 35px; border-radius: 6px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border: 1px solid #334155; transition: 0.2s; }
        .grid-dot.correct { background: #10b981 !important; border-color: #059669; }
        .grid-dot.wrong { background: #ef4444 !important; border-color: #b91c1c; }
        .grid-dot.marked { background: #f59e0b !important; border-color: #d97706; }
        .grid-dot.active { border: 2px solid #38bdf8; transform: scale(1.1); }
        .opt-btn { width: 100%; text-align: left; padding: 16px; border-radius: 12px; background: #1e293b; border: 1px solid #334155; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .opt-btn.correct { background: #059669 !important; border-color: #10b981; }
        .opt-btn.wrong { background: #991b1b !important; border-color: #ef4444; }
        .hidden-section { display: none; }
        #grid-dots::-webkit-scrollbar { width: 5px; }
        #grid-dots::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div id="main-menu" class="max-w-md mx-auto mt-10 space-y-6">
        <h1 class="text-4xl font-black text-center text-sky-400 italic">DRONE EXAM PRO</h1>
        <div class="grid gap-4">
            <button onclick="showSection('study-menu')" class="p-6 bg-sky-600 rounded-2xl font-bold text-xl shadow-xl hover:bg-sky-500 transition">STUDY MODE</button>
            <button onclick="showSection('exam-menu')" class="p-6 bg-purple-600 rounded-2xl font-bold text-xl shadow-lg hover:bg-purple-500 transition">EXAM MODE</button>
        </div>
    </div>

    <div id="study-menu" class="hidden-section max-w-md mx-auto mt-10 space-y-4">
        <h2 class="text-xl font-bold text-center text-sky-400">STUDY MODE - ΕΝΟΤΗΤΕΣ</h2>
        <div class="space-y-2">
            <button onclick="openStudyOptions('ΚΑΝΟΝΙΣΜΟΙ')" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 text-left">1. ΚΑΝΟΝΙΣΜΟΙ</button>
            <button onclick="openStudyOptions('ΑΣΦΑΛΕΙΑ')" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 text-left">2. ΑΣΦΑΛΕΙΑ</button>
            <button onclick="openStudyOptions('ΠΕΡΙΒΑΛΛΟΝ')" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 text-left">3. ΠΕΡΙΒΑΛΛΟΝ</button>
            <button onclick="openStudyOptions('ALL')" class="w-full p-4 bg-slate-700 rounded-xl border border-slate-600 text-left font-bold">ΟΛΕΣ ΟΙ ΕΝΟΤΗΤΕΣ</button>
            <button onclick="openStudyOptions('RANDOM')" class="w-full p-4 bg-amber-600 rounded-xl font-bold">RANDOM TEST</button>
        </div>
        <button onclick="showSection('main-menu')" class="w-full text-slate-500 py-4">ΠΙΣΩ</button>
    </div>

    <div id="count-menu" class="hidden-section max-w-md mx-auto mt-10 text-center space-y-6">
        <h2 class="text-xl font-bold">ΠΟΣΕΣ ΕΡΩΤΗΣΕΙΣ;</h2>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="initQuiz('STUDY', 5)" class="p-4 bg-slate-800 rounded-xl border border-slate-700">5</button>
            <button onclick="initQuiz('STUDY', 10)" class="p-4 bg-slate-800 rounded-xl border border-slate-700">10</button>
            <button onclick="initQuiz('STUDY', 20)" class="p-4 bg-slate-800 rounded-xl border border-slate-700">20</button>
            <button onclick="initQuiz('STUDY', 0)" class="p-4 bg-sky-900 rounded-xl border border-sky-700 text-sm">ΟΛΕΣ</button>
        </div>
    </div>

    <div id="exam-menu" class="hidden-section max-w-md mx-auto mt-10 space-y-6 text-center">
        <h2 class="text-xl font-bold text-purple-400 uppercase">EXAM MODE</h2>
        <div class="bg-slate-800 p-6 rounded-2xl border border-purple-500/30">
            <p class="text-sm text-slate-400 mb-4">40 τυχαίες ερωτήσεις | 60 λεπτά χρόνο</p>
            <button onclick="initQuiz('EXAM', 40)" class="w-full py-4 bg-purple-600 rounded-xl font-bold text-lg">ΕΝΑΡΞΗ ΕΞΕΤΑΣΗΣ</button>
        </div>
        <button onclick="showSection('main-menu')" class="w-full text-slate-500">ΠΙΣΩ</button>
    </div>

    <div id="quiz-container" class="hidden-section max-w-7xl mx-auto flex flex-col lg:flex-row gap-6 mt-4">
        
        <div class="flex-1 flex flex-col h-[calc(100vh-100px)]">
            <div class="flex justify-between items-center bg-slate-800 p-3 rounded-t-xl border-b border-slate-700">
                <button onclick="confirmExit()" class="text-xs font-bold text-red-400 bg-red-950/30 px-3 py-1 rounded">MENY</button>
                <div id="timer" class="font-mono text-xl text-sky-400 font-bold"></div>
                <div id="progress-header" class="text-xs font-bold text-slate-400 uppercase tracking-widest"></div>
            </div>

            <div class="flex-1 bg-slate-800/50 p-6 overflow-y-auto">
                <h2 id="question-text" class="text-lg md:text-xl font-semibold mb-6 leading-relaxed"></h2>
                <div id="options-grid" class="space-y-3"></div>
                
                <div id="explanation-box" class="hidden mt-6 p-4 bg-slate-900 border-l-4 border-red-500 rounded-r-xl">
                    <p class="text-xs text-red-500 font-bold mb-1 uppercase">Γιατί είναι λάθος;</p>
                    <p id="explanation-text" class="text-sm text-slate-300 italic"></p>
                </div>
            </div>

            <div class="bg-slate-900 p-4 border-t border-slate-800 grid grid-cols-4 gap-2">
                <button onclick="prevQuestion()" class="p-3 bg-slate-700 rounded-xl font-bold text-xs uppercase">ΠΙΣΩ</button>
                <button onclick="toggleNote()" class="p-3 bg-amber-600/20 text-amber-500 border border-amber-500/50 rounded-xl font-bold text-xs uppercase">ΣΗΜΕΙΩΣΗ</button>
                <button onclick="nextQuestion()" class="p-3 bg-slate-700 rounded-xl font-bold text-xs uppercase">ΕΠΟΜΕΝΟ</button>
                <button onclick="finishQuiz()" class="p-3 bg-red-600 rounded-xl font-bold text-xs uppercase">ΤΕΛΟΣ</button>
            </div>
        </div>

        <div class="w-full lg:w-72 bg-slate-900 p-4 rounded-xl border border-slate-800">
            <h3 class="text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-[0.2em] text-center">Λίστα Ερωτήσεων</h3>
            <div id="grid-dots" class="grid grid-cols-5 md:grid-cols-10 lg:grid-cols-4 gap-2 max-h-[500px] overflow-y-auto p-1"></div>
        </div>
    </div>

    <div id="results-screen" class="hidden-section max-w-md mx-auto mt-10 text-center space-y-8 p-6 bg-slate-800 rounded-3xl border border-slate-700">
        <h2 class="text-3xl font-black">ΑΠΟΤΕΛΕΣΜΑΤΑ</h2>
        <div class="flex justify-around">
            <div class="p-4 bg-green-900/30 rounded-2xl border border-green-500/50">
                <p class="text-3xl font-bold text-green-500" id="res-correct"></p>
                <p class="text-[10px] uppercase font-bold text-slate-400">Σωστά</p>
            </div>
            <div class="p-4 bg-red-900/30 rounded-2xl border border-red-500/50">
                <p class="text-3xl font-bold text-red-500" id="res-wrong"></p>
                <p class="text-[10px] uppercase font-bold text-slate-400">Λάθη</p>
            </div>
        </div>
        <div id="res-status" class="text-xl font-bold py-4 rounded-xl italic"></div>
        <button onclick="location.reload()" class="w-full py-4 bg-sky-600 rounded-xl font-bold">ΠΙΣΩ ΣΤΟ ΜΕΝΟΥ</button>
    </div>

    <script>
        const allQuestions = [
            {"id":1,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Ποιο είναι το μέγιστο ύψος στην Ανοικτή Κατηγορία;","o":["50μ","120μ","150μ","Χωρίς όριο"],"a":1,"e":"Το μέγιστο ύψος πτήσης στην Ανοικτή Κατηγορία είναι τα 120 μέτρα από την επιφάνεια του εδάφους."},
            {"id":2,"c":"ΑΣΦΑΛΕΙΑ","q":"Ελάχιστη ηλικία χειριστή στην Ελλάδα;","o":["12","14","16","18"],"a":2,"e":"Στην Ελλάδα η ελάχιστη ηλικία είναι τα 16 έτη για την Ανοικτή Κατηγορία."},
            {"id":3,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Ποια κατηγορία αφορά πτήσεις μακριά από ανθρώπους;","o":["Α1","Α2","Α3","Ειδική"],"a":2,"e":"Η υποκατηγορία Α3 αφορά πτήσεις σε χώρους όπου δεν αναμένεται να υπάρχουν άνθρωποι."},
            {"id":4,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι κάνουμε αν δούμε επανδρωμένο αεροσκάφος;","o":["Πετάμε ψηλότερα","Το ακολουθούμε","Προσγειωνόμαστε/Κατεβαίνουμε αμέσως","Τίποτα"],"a":2,"e":"Τα μη επανδρωμένα πρέπει πάντα να δίνουν προτεραιότητα στα επανδρωμένα αεροσκάφη."},
            {"id":5,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Πώς επηρεάζει ο αέρας την μπαταρία;","o":["Κρατάει πιο πολύ","Καμία επίδραση","Την εξαντλεί γρηγορότερα","Την φορτίζει"],"a":2,"e":"Ο αέρας αναγκάζει τα μοτέρ να δουλεύουν πιο έντονα, καταναλώνοντας περισσότερη ενέργεια."},
            {"id":6,"c":"ΑΣΦΑΛΕΙΑ","q":"Επιτρέπεται η πτήση πάνω από πλήθος ανθρώπων;","o":["Ναι","Όχι","Μόνο αν έχουμε άδεια","Μόνο αν είναι μικρό"],"a":1,"e":"Απαγορεύεται αυστηρά η πτήση πάνω από συγκεντρώσεις ανθρώπων στην Ανοικτή."},
            {"id":7,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι σημαίνει VLOS;","o":["Video Live On Screen","Visual Line Of Sight","Virtual Light Operation","Variable Link System"],"a":1,"e":"Visual Line Of Sight σημαίνει ότι ο χειριστής πρέπει να βλέπει το drone με τα μάτια του."},
            {"id":8,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το Fail-safe;","o":["Λειτουργία κάμερας","Αυτόματη ενέργεια (π.χ. RTH)","Είδος μπαταρίας","Τύπος έλικας"],"a":1,"e":"Σύστημα που ενεργοποιείται αυτόματα όταν χαθεί η σύνδεση με το χειριστήριο."},
            {"id":9,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Κίνδυνος πτήσης κοντά σε μεταλλικές κατασκευές;","o":["Σκουριά","Παρεμβολές στην πυξίδα/GPS","Κανένας","Καλύτερο σήμα"],"a":1,"e":"Τα μέταλλα προκαλούν παρεμβολές στα συστήματα πλοήγησης."},
            {"id":10,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Πού αναγράφεται ο αριθμός εγγραφής εκμεταλλευόμενου;","o":["Στο κουτί","Στο χειριστήριο","Πάνω στο drone","Μόνο στο κινητό"],"a":2,"e":"Ο κωδικός πρέπει να τοποθετείται εμφανώς πάνω στο drone."},
            {"id":11,"c":"ΑΣΦΑΛΕΙΑ","q":"Πότε ελέγχουμε τις έλικες;","o":["Κάθε μήνα","Μετά από πτώση","Πριν από κάθε πτήση","Ποτέ"],"a":2,"e":"Ο έλεγχος των ελίκων είναι απαραίτητος πριν από κάθε απογείωση."},
            {"id":12,"c":"ΑΣΦΑΛΕΙΑ","q":"Αν η μπαταρία LiPo φαίνεται φουσκωμένη;","o":["Την πατάμε","Συνεχίζουμε","Την αποσύρουμε αμέσως","Την φορτίζουμε"],"a":2,"e":"Μια φουσκωμένη μπαταρία είναι επικίνδυνη για έκρηξη ή φωτιά."},
            {"id":13,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Πτήση πάνω από στρατιωτικές εγκαταστάσεις;","o":["Ναι","Όχι","Μόνο Κυριακή","Με χαμηλή ταχύτητα"],"a":1,"e":"Απαγορεύεται αυστηρά η πτήση και φωτογράφιση στρατιωτικών περιοχών."},
            {"id":14,"c":"ΑΣΦΑΛΕΙΑ","q":"Μέγιστη απόσταση από χειριστή στην Ανοικτή;","o":["500μ","Όσο φτάνει το σήμα","Εντός οπτικής επαφής (VLOS)","1χλμ"],"a":2,"e":"Η απόσταση περιορίζεται από την ικανότητα του χειριστή να βλέπει το drone."},
            {"id":15,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Αν ξεκινήσει βροχή κατά την πτήση;","o":["Συνεχίζουμε","Προσγειωνόμαστε αμέσως","Πετάμε πιο ψηλά","Κάνουμε ελιγμούς"],"a":1,"e":"Τα drones δεν είναι αδιάβροχα. Η υγρασία βραχυκυκλώνει τα ηλεκτρονικά."},
            {"id":16,"c":"ΑΣΦΑΛΕΙΑ","q":"Γιατί δεν πετάμε κοντά σε αεροδρόμια;","o":["Θόρυβος","Κίνδυνος σύγκρουσης","Φωτογραφίες","Σήμα"],"a":1,"e":"Είναι ζώνες υψηλού κινδύνου (No Fly Zones)."},
            {"id":17,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Ποιος έχει την κύρια ευθύνη ασφάλειας;","o":["Κατασκευαστής","ΥΠΑ","Ο χειριστής","Ιδιοκτήτης"],"a":2,"e":"Ο τηλεχειριστής είναι υπεύθυνος για κάθε κίνηση του drone."},
            {"id":18,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι σημαίνει RTH;","o":["Real Time Height","Return To Home","Rapid Turn Hover","Remote Test Hub"],"a":1,"e":"Return To Home: Λειτουργία επιστροφής στο σημείο απογείωσης."},
            {"id":19,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Πώς επηρεάζει το κρύο τις μπαταρίες;","o":["Κρατάνε πιο πολύ","Μειώνεται η απόδοση","Τις φορτίζει","Τίποτα"],"a":1,"e":"Το κρύο επιβραδύνει τις χημικές αντιδράσεις στη μπαταρία."},
            {"id":20,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Πτήση τη νύχτα στην Ανοικτή;","o":["Όχι","Ναι, με πράσινο φως","Μόνο με φεγγάρι","Σε κλειστό χώρο"],"a":1,"e":"Επιτρέπεται αρκεί το drone να έχει πράσινο παλλόμενο φως."},
            {"id":21,"c":"ΑΣΦΑΛΕΙΑ","q":"Αν δούμε πουλιά να πλησιάζουν;","o":["Τα ακολουθούμε","Απομακρυνόμαστε άμεσα","Πετάμε κοντά","Θόρυβο"],"a":1,"e":"Τα πουλιά μπορεί να επιτεθούν στο drone ή να τραυματιστούν."},
            {"id":22,"c":"ΑΣΦΑΛΕΙΑ","q":"Ρόλος Παρατηρητή (Visual Observer);","o":["Φωτογραφίες","Βοήθεια στο VLOS/εμπόδια","Κρατά μπαταρία","GPS"],"a":1,"e":"Βοηθά τον χειριστή να εντοπίζει κινδύνους που ο ίδιος δεν βλέπει."},
            {"id":23,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το Gimbal;","o":["Μοτέρ έλικας","Σταθεροποιητής κάμερας","Κεραία","Φίλτρο"],"a":1,"e":"Σύστημα που κρατά την κάμερα σταθερή ανεξάρτητα από τις κλίσεις."},
            {"id":24,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Δείκτης K-Index;","o":["Αέρας","Γεωμαγνητική δραστηριότητα","Υγρασία","Θερμοκρασία"],"a":1,"e":"Υψηλός δείκτης K σημαίνει ηλιακές καταιγίδες που επηρεάζουν το GPS."},
            {"id":25,"c":"ΑΣΦΑΛΕΙΑ","q":"Τάση Storage για LiPo;","o":["Άδεια","50-60%","Γεμάτη","Χαλασμένη"],"a":1,"e":"Ιδανική τάση για να παραμείνει η μπαταρία υγιής στην αποθήκευση."},
            {"id":26,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το Remote ID;","o":["Κωδικός χειριστή","Ψηφιακή ταυτότητα/θέση drone","Διεύθυνση","WiFi"],"a":1,"e":"Σύστημα που επιτρέπει στις αρχές να ταυτοποιούν το drone εν πτήσει."},
            {"id":27,"c":"ΑΣΦΑΛΕΙΑ","q":"Υπερβολική ζέστη στα ηλεκτρονικά;","o":["Πετάνε ταχύτερα","Υπερθέρμανση/Shutdown","Καλύτερη εικόνα","Τίποτα"],"a":1,"e":"Μπορεί να προκαλέσει διακοπή λειτουργίας ή βλάβες."},
            {"id":28,"c":"ΑΣΦΑΛΕΙΑ","q":"Αν το drone τρέμει έντονα;","o":["Γκάζι","Προσγείωση και έλεγχος","Τίποτα","Κάμερα"],"a":1,"e":"Σημαίνει πρόβλημα σε έλικα ή μοτέρ, κίνδυνος πτώσης."},
            {"id":29,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Βάρος drone στην Α1 (C0);","o":["250g","900g","4kg","25kg"],"a":0,"e":"Τα drones C0 είναι κάτω από 250g."},
            {"id":30,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το Home Point;","o":["Σπίτι χειριστή","Σημείο κλειδώματος GPS/απογείωσης","Τυχαίο σημείο","Αεροδρόμιο"],"a":1,"e":"Οι συντεταγμένες επιστροφής της λειτουργίας RTH."},
            {"id":31,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Συχνότητα ανανέωσης εγγραφής εκμεταλλευόμενου;","o":["Κάθε χρόνο","Κάθε 3 χρόνια","Κάθε 5 χρόνια","Ποτέ"],"a":1,"e":"Η εγγραφή έχει διάρκεια 3 ετών."},
            {"id":32,"c":"ΑΣΦΑΛΕΙΑ","q":"Imu Calibration;","o":["Φόρτιση","Βαθμονόμηση ισορροπίας","Έλικες","Κάμερα"],"a":1,"e":"Ρύθμιση αισθητήρων για να μπορεί το drone να στέκεται ίσια."},
            {"id":33,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Μεταφορά επικίνδυνων εμπορευμάτων;","o":["Ναι","Όχι","Μικρά","Ειδική τσάντα"],"a":1,"e":"Απαγορεύεται αυστηρά στην Ανοικτή Κατηγορία."},
            {"id":34,"c":"ΑΣΦΑΛΕΙΑ","q":"Αν χάσει το GPS (ATTI mode);","o":["Πανικός","Χειροκίνητος έλεγχος/προσγείωση","Περιμένουμε","Κλείσιμο χειριστηρίου"],"a":1,"e":"Το drone παρασύρεται από τον άνεμο και απαιτεί ικανότητες χειριστή."},

            {"id":36,"c":"ΑΣΦΑΛΕΙΑ","q":"Προσοχή κατά την απογείωση;","o":["Κινητό","Άνθρωποι/εμπόδια","Κάμερα","Σύννεφα"],"a":1,"e":"Πρέπει να υπάρχει καθαρή ζώνη ασφαλείας γύρω από το σκάφος."},
            {"id":37,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Ύψος πτήσης επανδρωμένων;","o":["Πάνω από 150μ","Κάτω από 100μ","Στα 50μ","Οπουδήποτε"],"a":0,"e":"Τα επανδρωμένα πετάνε συνήθως πάνω από 500 πόδια."},

            {"id":207,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Frequency Hopping';","o":["Το σπάσιμο","Αυτόματη αλλαγή συχνότητας για αποφυγή παρεμβολών","Η ταχύτητα","Το GPS"],"a":1,"e":"Τεχνολογία που κρατά τη σύνδεση σταθερή σε δύσκολα περιβάλλοντα."},
            {"id":208,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Dew Point' (Σημείο δρόσου);","o":["Ζέστη","Η θερμοκρασία στην οποία ο αέρας υγροποιείται (υγρασία)","Βροχή","Κρύο"],"a":1,"e":"Σημαντικό για να ξέρουμε αν θα σχηματιστεί ομίχλη."},
            {"id":209,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το 'Certificate of Airworthiness';","o":["Το δίπλωμα","Πιστοποιητικό αξιοπλοΐας (για μεγάλα drones)","Η απόδειξη","Η κάμερα"],"a":1,"e":"Δεν απαιτείται για την Ανοικτή Κατηγορία."},
            {"id":210,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Pilot Fatigue';","o":["Η πείνα","Η κούραση του χειριστή που μειώνει την προσοχή","Το κρύο","Η ζέστη"],"a":1,"e":"Μην πετάς αν νιώθεις εξαντλημένος."},
            {"id":211,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Vibration Dampening';","o":["Κραδασμοί","Συστήματα (λάστιχα) που μειώνουν τους κραδασμούς στην κάμερα","Η ταχύτητα","Η μπαταρία"],"a":1,"e":"Απαραίτητο για ομαλό βίντεο χωρίς jello."},
            {"id":212,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Orographic Lift';","o":["Αέρας στη θάλασσα","Ανοδικός αέρας που χτυπάει σε βουνό","Βροχή","Κρύο"],"a":1,"e":"Μπορεί να παρασύρει το drone ψηλότερα στο βουνό."},
            {"id":213,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το 'Standard Operating Procedures' (SOPs);","o":["Το κουτί","Τυποποιημένες διαδικασίες για κάθε φάση πτήσης","Διαφήμιση","Το όνομα"],"a":1,"e":"Αυξάνουν την ασφάλεια μέσω της επανάληψης σωστών βημάτων."},
            {"id":214,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Flight Limit Distance';","o":["Το μέγιστο ύψος","Το όριο απόστασης που βάζουμε στο λογισμικό","Το βάρος","Η ταχύτητα"],"a":1,"e":"Εικονικό 'λουρί' που δεν αφήνει το drone να απομακρυνθεί πολύ."},

            {"id":219,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'RTH Obstacle Check';","o":["Η κάμερα","Λειτουργία όπου το drone ελέγχει για εμπόδια κατά το RTH","Το GPS","Η μπαταρία"],"a":1,"e":"Αν το drone δεν έχει αισθητήρες, θα χτυπήσει σε ό,τι βρει μπροστά του στο RTH."},
            {"id":220,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Micro-climate';","o":["Ο καιρός στη χώρα","Ιδιαίτερες συνθήκες σε μια μικρή περιοχή (π.χ. ανάμεσα σε βράχια)","Βροχή","Κρύο"],"a":1,"e":"Ο καιρός μπορεί να είναι τελείως διαφορετικός 100 μέτρα πιο πέρα."},
            {"id":221,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το 'ID Card' του χειριστή;","o":["Η ταυτότητα","Η ψηφιακή κάρτα με το QR και το επίπεδο εκπαίδευσης","Η απόδειξη","Η φωτογραφία"],"a":1,"e":"Την κατεβάζεις από το σύστημα της ΥΠΑ."},
            {"id":222,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Beeper / Buzzer';","o":["Φως","Ηχητικό σήμα για τον εντοπισμό του drone αν πέσει","Η κάμερα","Η μπαταρία"],"a":1,"e":"Βοηθάει να βρεις το drone μέσα σε ψηλά χόρτα."},
            {"id":223,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Voltage Sag Warning';","o":["Τέλος μπαταρίας","Προειδοποίηση ότι η τάση έπεσε απότομα (λόγω γκαζιού)","Καλό","Φόρτιση"],"a":1,"e":"Αν επιμείνεις στο γκάζι, το drone μπορεί να κλείσει."},
            {"id":224,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Fogging' του φακού;","o":["Σκόνη","Θόλωμα του φακού από εσωτερική υγρασία ή διαφορά θερμοκρασίας","Τίποτα","Χρώμα"],"a":1,"e":"Συμβαίνει συχνά όταν βγάζεις το drone από κλιματιζόμενο αμάξι στη ζέστη."},
            {"id":225,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το 'Noise Level' (DB) ενός drone;","o":["Το βάρος","Η στάθμη θορύβου (αναγράφεται στα νέα drones με σήμανση C)","Το χρώμα","Η τιμή"],"a":1,"e":"Σημαντικό για τη μείωση της ενόχλησης σε αστικές περιοχές."},
            {"id":226,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Propeller Stress';","o":["Η κούραση της έλικας","Μικρο-ρωγμές στο πλαστικό από τη χρήση","Το βάρος","Το χρώμα"],"a":1,"e":"Οι έλικες πρέπει να αλλάζονται αν δείχνουν σημάδια φθοράς."},
            {"id":227,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Signal Relay';","o":["Ενίσχυση","Χρήση ενδιάμεσου σταθμού για επέκταση του σήματος","Το WiFi","Το GPS"],"a":1,"e":"Δεν επιτρέπεται συνήθως στην Ανοικτή Κατηγορία χωρίς άδεια."},
            {"id":228,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Reflected Light';","o":["Σκοτάδι","Φως που αντανακλάται (π.χ. από χιόνι) και τυφλώνει την κάμερα","Βροχή","Κρύο"],"a":1,"e":"Απαιτείται χρήση φίλτρων ND."},
            {"id":229,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το 'Commercial Operation';","o":["Πτήση για χόμπι","Πτήση με σκοπό το κέρδος (απαιτεί ασφάλεια/άδεια)","Αγώνες","Παιχνίδι"],"a":1,"e":"Στην Ελλάδα, ακόμα και το χόμπι απαιτεί ασφάλιση αν το drone είναι >250g."},
            {"id":230,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Pilot Log';","o":["Το κουτί","Προσωπικό ημερολόγιο πτήσεων του χειριστή","Φωτογραφία","Η τιμή"],"a":1,"e":"Αποδεικνύει την εμπειρία σου σε ώρες πτήσης."},
            {"id":231,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Safe Distance' από ανθρώπους;","o":["0μ","Η απόσταση που ορίζει ο νόμος ανάλογα την κατηγορία","500μ","1χλμ"],"a":1,"e":"Π.χ. 30 μέτρα στην Α2 (ή 5 μέτρα σε low speed)."},
            {"id":232,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Anemometer';","o":["Μετρητής ύψους","Μετρητής ταχύτητας ανέμου","Μετρητής μπαταρίας","Μετρητής σήματος"],"a":1,"e":"Χρήσιμο εργαλείο για να ξέρεις αν είναι ασφαλές να πετάξεις."},
            {"id":233,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το 'Standardization';","o":["Η τιμή","Η ομοιομορφία των κανόνων σε όλη την ΕΕ","Το χρώμα","Το βάρος"],"a":1,"e":"Εξασφαλίζει ότι το δίπλωμά σου αναγνωρίζεται παντού."},
            {"id":234,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Motor Lubrication';","o":["Λάδωμα των μοτέρ (σπάνια χρειάζεται στα brushless)","Το καθάρισμα","Η φόρτιση","Η πτώση"],"a":0,"e":"Τα περισσότερα drones έχουν κλειστά ρουλεμάν και δεν θέλουν λάδι."},
            {"id":235,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Flight Readiness';","o":["Η ταχύτητα","Η ετοιμότητα drone και χειριστή για πτήση","Η τιμή","Η φωτογραφία"],"a":1,"e":"Περιλαμβάνει και την ψυχολογική κατάσταση του χειριστή."},
            {"id":236,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Visibility Range';","o":["Η ανάλυση","Η μέγιστη απόσταση στην οποία βλέπεις καθαρά","Το χρώμα","Το ύψος"],"a":1,"e":"Πρέπει να είναι τουλάχιστον 5χλμ για ασφαλή πτήση VLOS."},
            {"id":237,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το 'Night Rating';","o":["Βαθμολογία","Πιστοποίηση για νυχτερινές πτήσεις (όπου απαιτείται)","Το χρώμα","Το φως"],"a":1,"e":"Στην Ανοικτή αρκεί ο πράσινος παλλόμενος φανός."},
            {"id":238,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Redundant Power Supply';","o":["Πολλές μπαταρίες","Διπλό σύστημα παροχής ρεύματος για ασφάλεια","Η φόρτιση","Η πτώση"],"a":1,"e":"Υπάρχει σε μεγάλα επαγγελματικά drones."},
            {"id":239,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το 'Soft-mounting';","o":["Χαλαρή τοποθέτηση","Χρήση ελαστικών για την απορρόφηση κραδασμών στον επεξεργαστή","Η πτώση","Η ταχύτητα"],"a":1,"e":"Βοηθά το γυροσκόπιο να μη 'μπερδεύεται' από τα μοτέρ."},
            {"id":240,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Air Turbulence' κοντά σε δέντρα;","o":["Σταθερός αέρας","Αναταράξεις που δημιουργούνται από το φύλλωμα","Βροχή","Κρύο"],"a":1,"e":"Ο αέρας γίνεται απρόβλεπτος πάνω από δασικές εκτάσεις."}
        );let currentQuiz = [];
        let currentIdx = 0;
        let userAnswers = {}; // {idx: {choice: X, status: 'correct'|'wrong', marked: bool}}
        let quizMode = ""; 
        let timerInterval;

        function showSection(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
        }

        function openStudyOptions(category) {
            window.selectedCategory = category;
            showSection('count-menu');
        }

        function initQuiz(mode, count) {
            quizMode = mode;
            currentIdx = 0;
            userAnswers = {};
            
            // Φιλτράρισμα ερωτήσεων
            let pool = [...allQuestions];
            if (quizMode === 'STUDY') {
                if (window.selectedCategory !== 'ALL' && window.selectedCategory !== 'RANDOM') {
                    pool = pool.filter(q => q.c === window.selectedCategory);
                }
                if (window.selectedCategory === 'RANDOM' || count > 0) {
                    pool.sort(() => Math.random() - 0.5);
                }
                currentQuiz = (count > 0) ? pool.slice(0, count) : pool;
            } else {
                // EXAM MODE: 40 Τυχαίες
                currentQuiz = pool.sort(() => Math.random() - 0.5).slice(0, 40);
                startTimer(60 * 60); // 60 λεπτά
            }

            renderGrid();
            showQuestion(0);
            showSection('quiz-container');
        }

        function renderGrid() {
            const grid = document.getElementById('grid-dots');
            grid.innerHTML = "";
            currentQuiz.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = "grid-dot";
                dot.id = `dot-${i}`;
                dot.innerText = i + 1;
                dot.onclick = () => showQuestion(i);
                grid.appendChild(dot);
            });
        }

        function showQuestion(idx) {
            currentIdx = idx;
            const q = currentQuiz[idx];
            
            // UI Updates
            document.querySelectorAll('.grid-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`).classList.add('active');
            document.getElementById('progress-header').innerText = `ΕΡΩΤΗΣΗ ${idx + 1} / ${currentQuiz.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            const optionsDiv = document.getElementById('options-grid');
            optionsDiv.innerHTML = "";
            
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerHTML = `<span class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold">${String.fromCharCode(65 + i)}</span> <span>${opt}</span>`;
                
                // Αν έχει ήδη απαντηθεί
                if (userAnswers[idx]) {
                    btn.disabled = true;
                    if (i === q.a) btn.classList.add('correct');
                    if (i === userAnswers[idx].choice && i !== q.a) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                optionsDiv.appendChild(btn);
            });

            // Επεξήγηση (Μόνο στο Study Mode και αν είναι λάθος)
            const expBox = document.getElementById('explanation-box');
            if (userAnswers[idx] && userAnswers[idx].status === 'wrong' && quizMode === 'STUDY') {
                document.getElementById('explanation-text').innerText = q.e;
                expBox.classList.remove('hidden');
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(choice) {
            const q = currentQuiz[currentIdx];
            const isCorrect = (choice === q.a);
            
            userAnswers[currentIdx] = {
                choice: choice,
                status: isCorrect ? 'correct' : 'wrong'
            };

            // Update Grid Dot
            const dot = document.getElementById(`dot-${currentIdx}`);
            dot.classList.add(isCorrect ? 'correct' : 'wrong');

            showQuestion(currentIdx);
        }

        function toggleNote() {
            const dot = document.getElementById(`dot-${currentIdx}`);
            if (dot.classList.contains('marked')) {
                dot.classList.remove('marked');
            } else {
                dot.classList.add('marked');
            }
        }

        function nextQuestion() {
            if (currentIdx < currentQuiz.length - 1) showQuestion(currentIdx + 1);
        }

        function prevQuestion() {
            if (currentIdx > 0) showQuestion(currentIdx - 1);
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            let t = seconds;
            timerInterval = setInterval(() => {
                let m = Math.floor(t / 60);
                let s = t % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (t <= 0) { clearInterval(timerInterval); finishQuiz(true); }
                t--;
            }, 1000);
        }

        function finishQuiz(force = false) {
            if (!force) {
                if (!confirm("Θέλετε να ολοκληρώσετε το τεστ και να δείτε τα αποτελέσματα;")) return;
            }
            
            clearInterval(timerInterval);
            let correct = 0;
            Object.values(userAnswers).forEach(a => { if (a.status === 'correct') correct++; });
            
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-wrong').innerText = currentQuiz.length - correct;
            
            const score = (correct / currentQuiz.length) * 100;
            const status = document.getElementById('res-status');
            if (score >= 75) {
                status.innerText = "ΕΠΙΤΥΧΙΑ! (PASS)";
                status.className = "text-xl font-bold py-4 rounded-xl italic bg-green-900/20 text-green-400 border border-green-500/30";
            } else {
                status.innerText = "ΑΠΟΤΥΧΙΑ (FAIL)";
                status.className = "text-xl font-bold py-4 rounded-xl italic bg-red-900/20 text-red-400 border border-red-500/30";
            }
            
            showSection('results-screen');
        }

        function confirmExit() {
            if (confirm("Επιστροφή στο αρχικό μενού; Η πρόοδος θα χαθεί.")) location.reload();
        }

        // Initialize
        showSection('main-menu');
    </script>
</body>
</html>
