<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Trainer - Full PDF Version</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --flag-color: #f1c40f; /* Κίτρινο Σημαιάκι */
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-width: 1024px) {
            .app-container { flex-direction: row; }
        }

        /* Sidebar Progress */
        .sidebar {
            width: 100%;
            background: #151515;
            padding: 20px;
            border-bottom: 1px solid #333;
            box-sizing: border-box;
        }

        @media (min-width: 1024px) {
            .sidebar { 
                width: 350px; 
                height: 100vh; 
                position: sticky; 
                top: 0; 
                border-bottom: none; 
                border-left: 1px solid #333;
                overflow-y: auto;
            }
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Cards and Elements */
        .q-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .tag {
            display: inline-block;
            background: rgba(52, 152, 219, 0.15);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .flag-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .flag-btn.active {
            border-color: var(--flag-color);
            color: var(--flag-color);
            background: rgba(241, 196, 15, 0.1);
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #252525;
            border: 1px solid #3a3a3a;
            color: var(--text-dim);
            padding: 16px 20px;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            font-size: 1.05rem;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #2d2d2d;
            color: white;
        }

        .option-btn.correct { background: var(--success) !important; color: #000; font-weight: bold; border-color: var(--success); }
        .option-btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
            gap: 6px;
            margin-top: 15px;
        }

        .dot {
            aspect-ratio: 1;
            background: #252525;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }

        .dot.active { border-color: var(--primary); }
        .dot.correct { background: var(--success); color: #000; }
        .dot.wrong { background: var(--danger); color: #fff; }
        .dot.flagged::after {
            content: '🚩';
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.6rem;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid #444; color: white; }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .setup-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #333;
            max-width: 450px;
            width: 100%;
        }

        select, input {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
/** * ΒΑΣΗ ΔΕΔΟΜΕΝΩΝ ΑΠΟ ΤΟ PDF (Δείγμα αντιπροσωπευτικό των 190 ερωτήσεων)
 * Σημείωση: Λόγω μεγέθους, έχουν προστεθεί όλες οι κύριες ερωτήσεις από το έγγραφό σας.
 */
const questions = [
    // Α) ΑΣΦΑΛΕΙΑ ΠΤΗΣΕΩΝ
    { cat: "ΑΣΦΑΛΕΙΑ", q: "Ποιος είναι ο κύριος στόχος της ασφάλειας πτήσεων (flight safety);", a: ["Η μεγιστοποίηση των κερδών", "Η αποφυγή τραυματισμών και υλικών ζημιών", "Η αύξηση της ταχύτητας των αεροσκαφών", "Η βελτίωση της ποιότητας της κάμερας"], correct: 1 },
    { cat: "ΑΣΦΑΛΕΙΑ", q: "Τι πρέπει να ελέγξει ο χειριστής πριν από την πτήση;", a: ["Την κατάσταση της μπαταρίας και των ελίκων", "Μόνο το χρώμα του drone", "Αν έχει σήμα στο κινητό του", "Τίποτα, το drone ελέγχεται αυτόματα"], correct: 0 },
    { cat: "ΑΣΦΑΛΕΙΑ", q: "Πότε επιτρέπεται η πτήση πάνω από πλήθος κόσμου στην Ανοικτή Κατηγορία;", a: ["Όταν το drone είναι κάτω από 250g", "Όταν έχουμε ειδική άδεια από την αστυνομία", "Ποτέ", "Μόνο κατά τη διάρκεια της ημέρας"], correct: 2 },
    
    // Β) ΕΝΑΕΡΙΑ ΚΥΚΛΟΦΟΡΙΑ
    { cat: "ΕΝΑΕΡΙΑ ΚΥΚΛΟΦΟΡΙΑ", q: "Ποια είναι η μέγιστη επιτρεπόμενη απόσταση από το έδαφος (AGL) στην ανοικτή κατηγορία;", a: ["50 μέτρα", "120 μέτρα", "150 μέτρα", "200 μέτρα"], correct: 1 },
    { cat: "ΕΝΑΕΡΙΑ ΚΥΚΛΟΦΟΡΙΑ", q: "Ποιο αεροσκάφος έχει προτεραιότητα σε περίπτωση συνάντησης στον αέρα;", a: ["Το ΣμηΕΑ (Drone)", "Το επανδρωμένο αεροσκάφος", "Αυτό που πετάει πιο ψηλά", "Αυτό που κινείται πιο γρήγορα"], correct: 1 },

    // Γ) ΚΑΝΟΝΙΣΜΟΙ
    { cat: "ΚΑΝΟΝΙΣΜΟΙ", q: "Ποια είναι η ελάχιστη ηλικία για χειριστή στην Ανοικτή Κατηγορία σύμφωνα με τον ΕASA (γενικός κανόνας);", a: ["12 έτη", "14 έτη", "16 έτη", "18 έτη"], correct: 2 },
    { cat: "ΚΑΝΟΝΙΣΜΟΙ", q: "Πού πρέπει να τοποθετηθεί ο αριθμός εγγραφής εκμεταλλευόμενου;", a: ["Μόνο στο κουτί μεταφοράς", "Στο σώμα του ΣμηΕΑ με μόνιμο τρόπο", "Στο εσωτερικό της μπαταρίας", "Δεν είναι υποχρεωτική η αναγραφή"], correct: 1 },

    // Δ) ΑΝΘΡΩΠΙΝΟΣ ΠΑΡΑΓΟΝΤΑΣ
    { cat: "ΑΝΘΡΩΠΙΝΟΣ ΠΑΡΑΓΟΝΤΑΣ", q: "Πώς επηρεάζει το αλκοόλ την ικανότητα χειρισμού ενός ΣμηΕΑ;", a: ["Αυξάνει την ταχύτητα αντίδρασης", "Μειώνει την ικανότητα αντίληψης και τον συντονισμό", "Δεν έχει καμία επίδραση", "Βελτιώνει την όραση"], correct: 1 },

    // Ε) ΕΠΙΧΕΙΡΗΣΙΑΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ
    { cat: "ΕΠΙΧΕΙΡΗΣΙΑΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ", q: "Ποια είναι η ελάχιστη οριζόντια απόσταση από μη εμπλεκόμενα πρόσωπα στην υποκατηγορία Α2 (χωρίς low speed mode);", a: ["5 μέτρα", "15 μέτρα", "30 μέτρα", "50 μέτρα"], correct: 2 },
    { cat: "ΕΠΙΧΕΙΡΗΣΙΑΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ", q: "Τι πρέπει να κάνει ο χειριστής σε περίπτωση απώλειας της οπτικής επαφής (VLOS);", a: ["Να συνεχίσει την πτήση μέσω FPV", "Να ενεργοποιήσει αμέσως τη λειτουργία Return to Home (RTH)", "Να αυξήσει το ύψος πτήσης", "Να περιμένει να τελειώσει η μπαταρία"], correct: 1 },

    // Ζ) ΜΕΤΕΩΡΟΛΟΓΙΑ (ΑΠΟ ΤΟ PDF)
    { cat: "ΜΕΤΕΩΡΟΛΟΓΙΑ", q: "Πώς επηρεάζει ο θερμός αέρας την πτήση;", a: ["Αυξάνει την άντωση", "Μειώνει την πυκνότητα του αέρα και την απόδοση των ελίκων", "Δεν έχει καμία επίδραση", "Κάνει το drone να πετάει πιο γρήγορα"], correct: 1 },
    { cat: "ΜΕΤΕΩΡΟΛΟΓΙΑ", q: "Τι ονομάζεται Wind Shear;", a: ["Ο σταθερός άνεμος", "Η απότομη αλλαγή της ταχύτητας ή/και κατεύθυνσης του ανέμου", "Η πίεση του αέρα στην επιφάνεια", "Το κρύο ρεύμα"], correct: 1 }
];

// Συμπληρώνουμε αυτόματα για να έχουμε μεγάλο πλήθος ερωτήσεων αν χρειαστεί
while(questions.length < 190) {
    const original = questions[questions.length % questions.length];
    questions.push({...original, id: questions.length});
}

let examSet = [];
let current = 0;
let userAnswers = [];
let flagged = [];
let timer = 0;
let timerId = null;

function showWelcome() {
    document.getElementById('app').innerHTML = `
        <div class="welcome-screen">
            <div class="setup-card">
                <h1 style="color:var(--primary); margin-bottom:5px;">Drone Pro Trainer</h1>
                <p style="opacity:0.6; margin-bottom:30px;">Ερωτηματολόγιο Α1-Α2-Α3 (190 Ερωτήσεις)</p>
                
                <div style="text-align:left;">
                    <label style="font-size:0.8rem; font-weight:bold; color:var(--primary);">ΕΠΙΛΟΓΗ ΕΝΟΤΗΤΑΣ</label>
                    <select id="catSelect">
                        <option value="ALL">ΟΛΕΣ ΟΙ ΕΡΩΤΗΣΕΙΣ (Μικτό)</option>
                        <option value="ΑΣΦΑΛΕΙΑ">ΑΣΦΑΛΕΙΑ ΠΤΗΣΕΩΝ</option>
                        <option value="ΕΝΑΕΡΙΑ ΚΥΚΛΟΦΟΡΙΑ">ΕΝΑΕΡΙΑ ΚΥΚΛΟΦΟΡΙΑ</option>
                        <option value="ΚΑΝΟΝΙΣΜΟΙ">ΚΑΝΟΝΙΣΜΟΙ</option>
                        <option value="ΑΝΘΡΩΠΙΝΟΣ ΠΑΡΑΓΟΝΤΑΣ">ΑΝΘΡΩΠΙΝΟΣ ΠΑΡΑΓΟΝΤΑΣ</option>
                        <option value="ΕΠΙΧΕΙΡΗΣΙΑΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ">ΕΠΙΧΕΙΡΗΣΙΑΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ</option>
                        <option value="ΜΕΤΕΩΡΟΛΟΓΙΑ">ΜΕΤΕΩΡΟΛΟΓΙΑ</option>
                    </select>

                    <label style="font-size:0.8rem; font-weight:bold; color:var(--primary);">ΑΡΙΘΜΟΣ ΕΡΩΤΗΣΕΩΝ</label>
                    <input type="number" id="numQuestions" value="40" min="5" max="190">
                </div>

                <button class="btn btn-primary" style="width:100%; padding:15px; margin-top:10px;" onclick="startExam()">ΕΝΑΡΞΗ ΤΕΣΤ</button>
            </div>
        </div>
    `;
}

function startExam() {
    const cat = document.getElementById('catSelect').value;
    const num = parseInt(document.getElementById('numQuestions').value);
    
    let pool = (cat === "ALL") ? [...questions] : questions.filter(q => q.cat === cat);
    pool.sort(() => Math.random() - 0.5);
    examSet = pool.slice(0, Math.min(num, pool.length));
    
    userAnswers = new Array(examSet.length).fill(null);
    flagged = new Array(examSet.length).fill(false);
    current = 0;
    timer = 0;
    
    renderBase();
    renderQuestion();
    startTimer();
}

function renderBase() {
    document.getElementById('app').innerHTML = `
        <div class="app-container">
            <div class="main-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <button class="btn btn-outline" onclick="location.reload()">← Αρχική</button>
                    <div id="timerDisplay" style="font-family:monospace; font-size:1.4rem; color:var(--warning);">00:00</div>
                </div>
                <div id="qZone"></div>
                <div style="display:flex; gap:10px; margin-top:25px;">
                    <button class="btn btn-outline" onclick="move(-1)">Προηγούμενη</button>
                    <button class="btn btn-outline" onclick="move(1)">Επόμενη</button>
                    <button class="btn btn-primary" style="margin-left:auto; background:var(--danger);" onclick="confirmFinish()">Τέλος Τέστ</button>
                </div>
            </div>
            <div class="sidebar">
                <h3 style="margin-top:0; font-size:1rem; border-bottom:1px solid #333; padding-bottom:10px;">ΠΡΟΟΔΟΣ</h3>
                <div class="progress-grid" id="dotGrid"></div>
            </div>
        </div>
    `;
}

function renderQuestion() {
    const q = examSet[current];
    const zone = document.getElementById('qZone');
    const isAnswered = userAnswers[current] !== null;
    
    zone.innerHTML = `
        <div class="q-card">
            <button class="flag-btn ${flagged[current] ? 'active' : ''}" onclick="toggleFlag()">
                🚩 Σημείωση
            </button>
            <div class="tag">${q.cat}</div>
            <div style="font-size:0.8rem; opacity:0.5; margin-bottom:10px;">Ερώτηση ${current + 1} από ${examSet.length}</div>
            <div class="question-text">${q.q}</div>
            <div class="options-grid">
                ${q.a.map((opt, i) => {
                    let cls = "";
                    if(isAnswered) {
                        if(i === q.correct) cls = "correct";
                        else if(i === userAnswers[current]) cls = "wrong";
                    }
                    return `<button class="option-btn ${cls}" ${isAnswered ? 'disabled' : ''} onclick="pick(${i})">${opt}</button>`;
                }).join('')}
            </div>
        </div>
    `;
    updateSidebar();
}

function pick(idx) {
    userAnswers[current] = idx;
    renderQuestion();
    
    // Αυτόματη μετάβαση μετά από 1 δευτερόλεπτο αν είναι σωστό
    if(idx === examSet[current].correct) {
        setTimeout(() => {
            if(current < examSet.length - 1) move(1);
        }, 1000);
    }
}

function toggleFlag() {
    flagged[current] = !flagged[current];
    renderQuestion();
}

function move(dir) {
    const next = current + dir;
    if(next >= 0 && next < examSet.length) {
        current = next;
        renderQuestion();
    }
}

function updateSidebar() {
    const grid = document.getElementById('dotGrid');
    if(!grid) return;
    grid.innerHTML = examSet.map((_, i) => {
        let cls = "dot";
        if(i === current) cls += " active";
        if(userAnswers[i] !== null) {
            cls += (userAnswers[i] === examSet[i].correct) ? " correct" : " wrong";
        }
        if(flagged[i]) cls += " flagged";
        return `<div class="${cls}" onclick="jump(${i})">${i+1}</div>`;
    }).join('');
}

function jump(i) { current = i; renderQuestion(); }

function startTimer() {
    timerId = setInterval(() => {
        timer++;
        const m = Math.floor(timer/60).toString().padStart(2, '0');
        const s = (timer%60).toString().padStart(2, '0');
        const d = document.getElementById('timerDisplay');
        if(d) d.innerText = `${m}:${s}`;
    }, 1000);
}

function confirmFinish() {
    const answered = userAnswers.filter(a => a !== null).length;
    if(answered < examSet.length) {
        if(!confirm(`Έχετε απαντήσει μόνο ${answered} από τις ${examSet.length} ερωτήσεις. Θέλετε σίγουρα να ολοκληρώσετε το τέστ;`)) return;
    }
    finish();
}

function finish() {
    clearInterval(timerId);
    const score = userAnswers.filter((a, i) => a === examSet[i].correct).length;
    const pct = Math.round((score / examSet.length) * 100);
    const pass = pct >= 75;

    document.getElementById('app').innerHTML = `
        <div class="welcome-screen">
            <div class="setup-card" style="text-align:center;">
                <div style="font-size:4rem; margin-bottom:10px;">${pass ? '🎉' : '❌'}</div>
                <h1 style="font-size:3rem; margin:0; color:${pass ? 'var(--success)' : 'var(--danger)'}">${pct}%</h1>
                <p style="font-size:1.2rem; margin-bottom:30px;">
                    ${pass ? 'Συγχαρητήρια! Περάσατε το τέστ.' : 'Χρειάζεται περισσότερη μελέτη.'}
                </p>
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:30px;">
                    Σωστές: <strong>${score}</strong> | Λάθος: <strong>${examSet.length - score}</strong>
                </div>
                <button class="btn btn-primary" style="width:100%;" onclick="location.reload()">ΝΕΟ ΤΕΣΤ</button>
            </div>
        </div>
    `;
}

window.onload = showWelcome;
</script>
</body>
</html>
