<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .option-btn { width: 100%; text-align: left; padding: 1rem; margin-bottom: 0.5rem; border-radius: 0.75rem; background: rgba(51, 65, 85, 0.5); border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; display: flex; align-items: center; }
        .option-btn:hover { background: rgba(51, 65, 85, 0.8); }
        .option-btn.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .correct-choice { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        .wrong-choice { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .dot { width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .dot.active { border-color: #3b82f6; color: #3b82f6; }
        .dot.answered { background: #3b82f6; color: white; border-color: #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <main id="start-screen" class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-card rounded-3xl p-8 text-center border border-white/10 shadow-2xl">
            <h1 class="text-4xl font-extrabold mb-2 uppercase tracking-tight text-blue-500">Drone Exam</h1>
            <h2 class="text-xl font-bold mb-8 text-slate-400 uppercase tracking-widest">Προετοιμασία 310 Ερωτήσεων</h2>

            <div class="space-y-6 text-left">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1 mb-2 block">Ενότητα</label>
                    <select id="categorySelect" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl font-bold appearance-none cursor-pointer">
                        <option value="all">Όλες οι Ενότητες</option>
                        <option value="Α) ΑΣΦΑΛΕΙΑ ΠΤΗΣΕΩΝ ΣμηΕΑ">Α) ΑΣΦΑΛΕΙΑ ΠΤΗΣΕΩΝ ΣμηΕΑ</option>
                        <option value="Β) ΠΕΡΙΟΡΙΣΜΟΙ ΕΝΑΕΡΙΟΥ ΧΩΡΟΥ">Β) ΠΕΡΙΟΡΙΣΜΟΙ ΕΝΑΕΡΙΟΥ ΧΩΡΟΥ</option>
                        <option value="Γ) ΑΕΡΟΠΟΡΙΚΟΙ ΚΑΝΟΝΙΣΜΟΙ">Γ) ΑΕΡΟΠΟΡΙΚΟΙ ΚΑΝΟΝΙΣΜΟΙ</option>
                        <option value="Δ) ΓΕΝΙΚΕΣ ΓΝΩΣΕΙΣ ΣμηΕΑ">Δ) ΓΕΝΙΚΕΣ ΓΝΩΣΕΙΣ ΣμηΕΑ</option>
                        <option value="Ε) ΙΔΙΩΤΙΚΟΤΗΤΑ ΚΑΙ ΠΡΟΣΤΑΣΙΑ ΔΕΔΟΜΕΝΩΝ">Ε) ΙΔΙΩΤΙΚΟΤΗΤΑ ΚΑΙ ΠΡΟΣΤΑΣΙΑ ΔΕΔΟΜΕΝΩΝ</option>
                        <option value="ΣΤ) ΑΣΦΑΛΙΣΗ">ΣΤ) ΑΣΦΑΛΙΣΗ</option>
                        <option value="Ζ) ΑΝΘΡΩΠΙΝΗ ΑΠΟΔΟΣΗ ΚΑΙ ΠΕΡΙΟΡΙΣΜΟΙ">Ζ) ΑΝΘΡΩΠΙΝΗ ΑΠΟΔΟΣΗ ΚΑΙ ΠΕΡΙΟΡΙΣΜΟΙ</option>
                        <option value="Η) ΓΕΝΙΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ ΜΕΤΡΙΑΣΜΟΥ ΚΙΝΔΥΝΩΝ">Η) ΓΕΝΙΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ ΜΕΤΡΙΑΣΜΟΥ ΚΙΝΔΥΝΩΝ</option>
                        <option value="Θ) ΜΕΤΕΩΡΟΛΟΓΙΑ">Θ) ΜΕΤΕΩΡΟΛΟΓΙΑ</option>
                        <option value="Ι) ΠΤΗΣΙΚΕΣ ΕΠΙΔΟΣΕΙΣ ΣμηΕΑ">Ι) ΠΤΗΣΙΚΕΣ ΕΠΙΔΟΣΕΙΣ ΣμηΕΑ</option>
                        <option value="Κ) ΤΕΧΝΙΚΟΙ ΚΑΙ ΛΕΙΤΟΥΡΓΙΚΟΙ ΜΕΤΡΙΑΣΜΟΙ ΚΙΝΔΥΝΩΝ">Κ) ΤΕΧΝΙΚΟΙ ΚΑΙ ΛΕΙΤΟΥΡΓΙΚΟΙ ΜΕΤΡΙΑΣΜΟΙ ΚΙΝΔΥΝΩΝ</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1 mb-2 block">Αριθμός Ερωτήσεων</label>
                    <select id="amountSelect" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl font-bold appearance-none cursor-pointer">
                        <option value="all">Όλες οι ερωτήσεις</option>
                        <option value="10">10 Ερωτήσεις</option>
                        <option value="20">20 Ερωτήσεις</option>
                        <option value="40">40 Ερωτήσεις</option>
                    </select>
                </div>

                <div class="pt-4 space-y-4">
                    <button onclick="startStudy()" class="w-full py-5 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold text-lg transition-all">STUDY MODE</button>
                    <button onclick="startExam()" class="w-full py-5 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold text-lg transition-all border border-white/5">EXAM MODE</button>
                </div>
            </div>
        </div>
    </main>

    <main id="quiz-screen" class="hidden flex-1 flex flex-col p-4 md:p-8 max-w-4xl mx-auto w-full">
        <header class="flex justify-between items-center mb-8">
            <div>
                <span id="q-header" class="text-xs font-bold text-blue-500 uppercase tracking-widest block mb-1">ΚΑΤΗΓΟΡΙΑ</span>
                <span id="q-counter" class="text-2xl font-black">1 / 310</span>
            </div>
            <div id="active-timer" class="hidden text-2xl font-mono bg-rose-500/10 text-rose-500 px-6 py-3 rounded-2xl border border-rose-500/20">45:00</div>
        </header>

        <div class="w-full h-2 bg-slate-800 rounded-full mb-8 overflow-hidden">
            <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 md:p-12 mb-8 relative">
            <p id="q-text" class="text-xl md:text-2xl font-semibold leading-relaxed mb-10">Φόρτωση ερώτησης...</p>
            <div id="options-container" class="space-y-4"></div>
            <div id="exp-text" class="hidden mt-8 p-6 bg-emerald-500/10 border border-emerald-500/20 rounded-3xl text-emerald-400 font-medium"></div>
        </div>

        <div id="dot-grid" class="flex flex-wrap gap-2 mb-10 justify-center overflow-y-auto max-h-32 p-2"></div>

        <footer class="mt-auto flex gap-4">
            <button id="prev-btn" onclick="prevQ()" class="flex-1 py-5 glass-card rounded-2xl font-bold">ΠΙΣΩ</button>
            <button onclick="nextQ()" class="flex-1 py-5 bg-blue-600 rounded-2xl font-bold shadow-lg shadow-blue-600/20">ΕΠΟΜΕΝΟ</button>
            <button onclick="showConfirm()" class="px-8 bg-emerald-600 rounded-2xl font-bold">ΤΕΛΟΣ</button>
        </footer>
    </main>

    <main id="results-screen" class="hidden flex-1 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-card rounded-[3rem] p-10 text-center">
            <div id="res-icon" class="text-8xl mb-6">🏆</div>
            <h2 id="res-title" class="text-4xl font-black mb-2 tracking-tight">ΑΠΟΤΕΛΕΣΜΑ</h2>
            <div id="res-score" class="text-8xl font-black text-blue-500 mb-4">0%</div>
            <p id="res-stats" class="text-slate-400 font-bold mb-10 uppercase tracking-widest">0 ΣΩΣΤΕΣ</p>
            <button onclick="location.reload()" class="w-full py-5 bg-blue-600 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-600/20">ΝΕΟ ΤΕΣΤ</button>
        </div>
    </main>

    <div id="confirm-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="max-w-sm w-full glass-card rounded-[2.5rem] p-8 text-center border border-white/10">
            <h3 class="text-2xl font-bold mb-6">Ολοκλήρωση;</h3>
            <div class="flex gap-4">
                <button onclick="hideConfirm()" class="flex-1 py-4 bg-slate-800 rounded-2xl font-bold">ΑΚΥΡΟ</button>
                <button onclick="submitQuiz()" class="flex-1 py-4 bg-emerald-600 rounded-2xl font-bold">ΝΑΙ, ΤΕΛΟΣ</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
