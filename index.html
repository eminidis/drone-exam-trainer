<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pilot Pro - 310 Questions Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-btn { width: 100%; text-align: left; padding: 1rem; background: rgba(51, 65, 85, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .option-btn:hover:not(:disabled) { background: rgba(71, 85, 105, 0.7); border-color: #38bdf8; }
        .option-btn.selected { border-color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
        .option-btn.correct { background: #064e3b !important; border-color: #10b981 !important; }
        .option-btn.wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
        .dot { width: 32px; height: 32px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; cursor: pointer; transition: all 0.2s; font-weight: 700; }
        .dot.active { border: 2px solid #38bdf8; color: #38bdf8; }
        .dot.answered { background: #334155; border-color: #475569; }
        .dot.correct-dot { background: #064e3b; border-color: #10b981; }
        .dot.wrong-dot { background: #7f1d1d; border-color: #ef4444; }
        .category-btn { transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); text-align: left; width: 100%; padding: 1rem; border-radius: 1rem; background: rgba(30, 41, 59, 0.5); }
        .category-btn:hover { background: rgba(56, 189, 248, 0.1); border-color: #38bdf8; transform: translateX(4px); }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-slate-950/80 p-4 sticky top-0 z-50 border-b border-white/10 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center font-black shadow-lg">D</div>
                <span class="font-black text-xl uppercase italic tracking-tighter">DRONE<span class="text-sky-400">PILOT</span> PRO</span>
            </div>
            <div id="active-timer" class="hidden font-mono font-bold text-sky-400 bg-slate-900 px-4 py-2 rounded-full border border-white/10">45:00</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 lg:p-8">
        <div id="menu-screen" class="py-12 text-center">
            <h1 class="text-4xl md:text-6xl font-black mb-16 italic uppercase leading-tight">ΠΛΗΡΗΣ ΒΑΣΗ <br><span class="text-sky-400 text-2xl md:text-4xl">310 ΕΡΩΤΗΣΕΩΝ (A1-A3 & A2)</span></h1>
            <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                <div onclick="showStudyOptions()" class="glass-card p-10 rounded-3xl cursor-pointer hover:scale-[1.02] transition-all group">
                    <div class="w-16 h-16 bg-sky-500/20 rounded-2xl flex items-center justify-center mb-6 mx-auto group-hover:bg-sky-500/40 transition-colors">
                        <svg class="w-8 h-8 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black mb-2 uppercase italic text-sky-400">STUDY MODE</h2>
                    <p class="text-slate-400 text-sm italic font-medium">Μελέτη ανά ενότητα ή ολόκληρη η βάση</p>
                </div>
                <div onclick="startExam()" class="glass-card p-10 rounded-3xl cursor-pointer hover:scale-[1.02] transition-all group border-purple-500/30">
                    <div class="w-16 h-16 bg-purple-500/20 rounded-2xl flex items-center justify-center mb-6 mx-auto group-hover:bg-purple-500/40 transition-colors">
                        <svg class="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black mb-2 uppercase italic text-purple-400">EXAM MODE</h2>
                    <p class="text-slate-400 text-sm italic font-medium">Τυχαία 40 ερωτήματα - 45 λεπτά - 75% βάση</p>
                </div>
            </div>
        </div>

        <div id="study-options" class="hidden max-w-4xl mx-auto">
            <button onclick="location.reload()" class="mb-6 flex items-center gap-2 text-sky-400 font-bold uppercase text-xs">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                ΠΙΣΩ
            </button>
            <h2 class="text-3xl font-black mb-8 uppercase italic">ΕΠΙΛΕΞΤΕ <span class="text-sky-400">ΠΕΡΙΕΧΟΜΕΝΟ</span></h2>
            <div id="category-list" class="grid gap-3"></div>
        </div>

        <div id="quiz-screen" class="hidden grid lg:grid-cols-4 gap-8 items-start">
            <div class="lg:col-span-3">
                <div id="q-header" class="mb-4 text-sky-400 font-black text-[10px] tracking-widest uppercase opacity-70"></div>
                <div class="glass-card p-6 md:p-12 rounded-[2.5rem] relative min-h-[400px]">
                    <div id="progress-bar" class="absolute top-0 left-0 h-1 bg-sky-500 transition-all duration-300" style="width: 0%"></div>
                    <h2 id="q-text" class="text-xl md:text-2xl font-bold leading-relaxed mb-10"></h2>
                    <div id="options-container" class="space-y-3"></div>
                    <div id="explanation" class="hidden mt-8 p-5 bg-emerald-500/10 border-l-4 border-emerald-500 rounded-xl">
                        <div class="text-emerald-400 font-black text-[10px] mb-1 uppercase">ΣΩΣΤΗ ΑΠΑΝΤΗΣΗ:</div>
                        <p id="exp-text" class="text-slate-200 text-sm"></p>
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button id="prev-btn" onclick="prevQ()" class="px-8 py-5 bg-slate-800 rounded-2xl font-bold uppercase text-xs">ΠΙΣΩ</button>
                    <button id="next-btn" onclick="nextQ()" class="flex-1 py-5 bg-sky-600 rounded-2xl font-black uppercase text-sm hover:bg-sky-500 transition-all">ΕΠΟΜΕΝΗ</button>
                </div>
            </div>
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-3xl">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">ΕΡΩΤΗΣΕΙΣ</h3>
                        <span id="q-counter" class="text-xs font-bold text-sky-400"></span>
                    </div>
                    <div id="dot-grid" class="grid grid-cols-5 sm:grid-cols-10 lg:grid-cols-4 gap-2 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>
                <button onclick="showConfirm()" class="w-full py-5 bg-emerald-600/20 border border-emerald-500/50 text-emerald-400 rounded-2xl text-xs font-black uppercase hover:bg-emerald-600 hover:text-white transition-all">ΥΠΟΒΟΛΗ</button>
            </div>
        </div>

        <div id="results-screen" class="hidden text-center py-12">
            <div id="res-icon" class="text-8xl mb-6"></div>
            <h2 id="res-title" class="text-5xl font-black mb-4 italic uppercase"></h2>
            <div class="glass-card p-12 rounded-[3.5rem] max-w-md mx-auto my-10 border-white/5">
                <div id="res-score" class="text-8xl font-black mb-2">0%</div>
                <p id="res-stats" class="text-slate-400 font-bold uppercase text-[10px] tracking-widest"></p>
            </div>
            <button onclick="location.reload()" class="px-12 py-6 bg-sky-500 text-white font-black rounded-2xl uppercase hover:bg-sky-400">ΕΠΙΣΤΡΟΦΗ</button>
        </div>
    </main>

    <div id="confirm-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md">
        <div class="glass-card p-10 rounded-[2.5rem] max-w-sm w-full text-center">
            <h3 class="text-2xl font-black mb-4 uppercase italic">ΥΠΟΒΟΛΗ;</h3>
            <p class="text-slate-400 text-sm mb-8">Θέλετε να ολοκληρώσετε το τεστ;</p>
            <div class="flex flex-col gap-3">
                <button onclick="submitQuiz()" class="w-full py-4 bg-sky-600 rounded-xl font-black uppercase">ΝΑΙ, ΟΛΟΚΛΗΡΩΣΗ</button>
                <button onclick="hideConfirm()" class="w-full py-4 bg-slate-800 rounded-xl font-bold text-slate-400 uppercase text-xs">ΑΚΥΡΩΣΗ</button>
            </div>
        </div>
    </div><script>
        const allQuestions = [
            // Εδώ μπαίνουν οι 310 ερωτήσεις σου από το αρχείο JSON.
            // Παράδειγμα σωστής δομής που πρέπει να ακολουθήσεις:
            {
                "id": 1,
                "category": "Α) ΑΣΦΑΛΕΙΑ ΠΤΗΣΕΩΝ ΣμηΕΑ",
                "question": "Πόσο μακριά επιτρέπεται να πετάω το ΣμηΕΑ ανοικτής κατηγορίας;",
                "options": [
                    "Αρκετά κοντά ώστε να μπορώ να μείνω σε οπτική επαφή (VLOS) με το ΣμηΕΑ",
                    "Σε μέγιστη απόσταση 200 μέτρων από τη θέση του απομακρυσμένου χειριστή",
                    "Σε απόσταση όπου μπορώ να δω καθαρά το ΣμηΕΑ χωρίς τεχνική βοήθεια και να σαρώσω τον εναέριο χώρο",
                    "Σε απόσταση που καθορίζεται στο εγχειρίδιο του κατασκευαστή"
                ],
                "answer": "γ"
            },
            // ... [Συνέχισε με τις υπόλοιπες 309 ερωτήσεις]
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let answers = [];
        let timer = null;
        let timeLeft = 45 * 60;
        let isStudyMode = false;

        function showStudyOptions() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('study-options').classList.remove('hidden');
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            
            // Δημιουργία κουμπιού για όλες τις ερωτήσεις
            const allBtn = document.createElement('button');
            allBtn.className = "category-btn border-sky-500/30 bg-sky-500/10 mb-4";
            allBtn.innerHTML = `
                <div class="font-black text-sky-400 text-lg uppercase italic">ΟΛΗ Η ΒΑΣΗ (310 ΕΡΩΤΗΣΕΙΣ)</div>
                <div class="text-xs text-slate-400 font-bold">Πλήρης προετοιμασία</div>
            `;
            allBtn.onclick = () => finalizeStudy('ALL');
            list.appendChild(allBtn);

            // Δυναμική δημιουργία κατηγοριών από το allQuestions
            const categories = [...new Set(allQuestions.map(q => q.category))];
            categories.forEach(cat => {
                const count = allQuestions.filter(q => q.category === cat).length;
                const btn = document.createElement('button');
                btn.className = "category-btn";
                btn.innerHTML = `
                    <div class="font-black text-sky-400 uppercase italic text-sm">${cat}</div>
                    <div class="text-[10px] text-slate-500 font-bold">${count} ΕΡΩΤΗΣΕΙΣ</div>
                `;
                btn.onclick = () => finalizeStudy(cat);
                list.appendChild(btn);
            });
        }

        function finalizeStudy(category) {
            isStudyMode = true;
            currentQuestions = (category === 'ALL') ? [...allQuestions] : allQuestions.filter(q => q.category === category);
            startQuiz();
        }

        function startExam() {
            isStudyMode = false;
            currentQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 40);
            document.getElementById('active-timer').classList.remove('hidden');
            startTimer();
            startQuiz();
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('active-timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                if(timeLeft <= 0) submitQuiz();
            }, 1000);
        }

        function startQuiz() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('study-options').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            answers = new Array(currentQuestions.length).fill(null);
            renderDotGrid();
            showQuestion();
        }

        function renderDotGrid() {
            const grid = document.getElementById('dot-grid');
            grid.innerHTML = '';
            currentQuestions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === currentIndex ? 'active' : ''}`;
                dot.id = `dot-${i}`;
                dot.innerText = i + 1;
                dot.onclick = () => jumpTo(i);
                grid.appendChild(dot);
            });
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('q-header').innerText = q.category;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('q-counter').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / currentQuestions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const char = ['α','β','γ','δ'][i];
                const btn = document.createElement('button');
                btn.className = `option-btn ${answers[currentIndex] === char ? 'selected' : ''}`;
                
                if (isStudyMode && answers[currentIndex]) {
                    if (char === q.answer) btn.classList.add('correct');
                    else if (char === answers[currentIndex]) btn.classList.add('wrong');
                    btn.disabled = true;
                }

                btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-[10px] font-black">${char.toUpperCase()}</span> ${opt}`;
                btn.onclick = () => selectOption(char);
                container.appendChild(btn);
            });

            const exp = document.getElementById('explanation');
            if(isStudyMode && answers[currentIndex]) {
                exp.classList.remove('hidden');
                const correctIdx = ['α','β','γ','δ'].indexOf(q.answer);
                document.getElementById('exp-text').innerText = q.options[correctIdx];
            } else {
                exp.classList.add('hidden');
            }

            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${currentIndex}`).classList.add('active');
            document.getElementById('prev-btn').style.opacity = currentIndex === 0 ? '0.5' : '1';
        }

        function selectOption(char) {
            if (isStudyMode && answers[currentIndex]) return;
            answers[currentIndex] = char;
            const dot = document.getElementById(`dot-${currentIndex}`);
            dot.classList.add('answered');
            if(isStudyMode) {
                if(char === currentQuestions[currentIndex].answer) dot.classList.add('correct-dot');
                else dot.classList.add('wrong-dot');
            }
            showQuestion();
            if(!isStudyMode) setTimeout(nextQ, 400);
        }

        function nextQ() { if(currentIndex < currentQuestions.length - 1) { currentIndex++; showQuestion(); } }
        function prevQ() { if(currentIndex > 0) { currentIndex--; showQuestion(); } }
        function jumpTo(i) { currentIndex = i; showQuestion(); }
        function showConfirm() { document.getElementById('confirm-modal').classList.remove('hidden'); }
        function hideConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }

        function submitQuiz() {
            if(timer) clearInterval(timer);
            hideConfirm();
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            let correct = 0;
            answers.forEach((ans, i) => { if(ans === currentQuestions[i].answer) correct++; });
            const score = Math.round((correct / currentQuestions.length) * 100);
            document.getElementById('res-score').innerText = score + '%';
            document.getElementById('res-title').innerText = score >= 75 ? "ΕΠΙΤΥΧΙΑ!" : "ΑΠΟΤΥΧΙΑ";
            document.getElementById('res-icon').innerText = score >= 75 ? "🏆" : "📉";
            document.getElementById('res-stats').innerText = `${correct} ΣΩΣΤΕΣ / ${currentQuestions.length} ΕΡΩΤΗΣΕΙΣ`;
        }
    </script>
</body>
</html>
