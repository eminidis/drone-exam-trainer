<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Trainer - Flag & Review</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --flag: #f39c12;
            --dark-bg: rgba(15, 15, 15, 0.98);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000 url('https://images.unsplash.com/photo-1508614589041-895b88991e3e?q=80&w=2000') center/cover no-repeat fixed;
            color: white;
            overflow-x: hidden;
        }

        .overlay {
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            backdrop-filter: blur(15px);
            background: var(--dark-bg);
        }

        .main {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .setup-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .timer-box {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: var(--warning);
        }

        .q-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 320px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .flag-btn {
            position: absolute;
            top: 30px;
            right: 35px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .flag-btn.active {
            background: var(--flag);
            border-color: var(--flag);
            color: #000;
        }

        .ans-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .ans-btn {
            padding: 18px 22px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            text-align: left;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .ans-btn:hover:not(:disabled) {
            background: rgba(52, 152, 219, 0.15);
            border-color: var(--primary);
        }

        .ans-btn.correct { background: var(--success) !important; border-color: var(--success); color: #000; font-weight: bold; }
        .ans-btn.wrong { background: var(--danger) !important; border-color: var(--danger); }

        .sidebar {
            width: 300px;
            background: rgba(0,0,0,0.3);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            overflow-y: auto;
        }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .dot {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .dot.active { border: 2px solid var(--primary); }
        .dot.flagged::after {
            content: "🚩";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.7rem;
        }
        .dot.flagged { border: 1px solid var(--flag); }
        .dot.done-correct { background: var(--success); color: #000; }
        .dot.done-wrong { background: var(--danger); }

        .btn { padding: 14px 28px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .explanation {
            margin-top: 25px;
            padding: 18px;
            background: rgba(241, 196, 15, 0.1);
            border-left: 4px solid var(--warning);
            border-radius: 8px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
const rawQuestions = [
    { cat: "safety", q: "Ποια είναι η ελάχιστη οριζόντια απόσταση που πρέπει να τηρείται από μη εμπλεκόμενα πρόσωπα στην υποκατηγορία Α2, όταν δεν υπάρχει περιορισμός ταχύτητας;", a: ["5 μέτρα", "10 μέτρα", "30 μέτρα", "50 μέτρα"], correct: 2, exp: "Στην υποκατηγορία Α2 η απόσταση είναι 30μ. Μπορεί να μειωθεί στα 5μ μόνο αν το drone διαθέτει λειτουργία χαμηλής ταχύτητας." },
    { cat: "regulations", q: "Ποιο είναι το μέγιστο επιτρεπόμενο ύψος πτήσης (AGL) στην Ανοικτή Κατηγορία;", a: ["100 μέτρα", "120 μέτρα", "150 μέτρα", "500 μέτρα"], correct: 1, exp: "Το ανώτατο όριο είναι 120 μέτρα (400 πόδια) από την επιφάνεια της γης." },
    { cat: "weather", q: "Πώς επηρεάζει ο θερμός αέρας την πτήση ενός drone;", a: ["Αυξάνει την αυτονομία", "Μειώνει την πυκνότητα του αέρα και την άντωση", "Κάνει το drone πιο σταθερό", "Δεν έχει επίδραση"], correct: 1, exp: "Ο θερμός αέρας είναι λιγότερο πυκνός, αναγκάζοντας τους κινητήρες να δουλεύουν περισσότερο." },
    { cat: "technical", q: "Τι πρέπει να προσέχει ο χειριστής πριν από την απογείωση όσον αφορά την πυξίδα (Compass);", a: ["Να είναι στραμμένη στον ήλιο", "Να μην υπάρχουν κοντά μεγάλες μεταλλικές κατασκευές", "Να είναι απενεργοποιημένο το GPS", "Τίποτα, είναι αυτόματο"], correct: 1, exp: "Μεταλλικά αντικείμενα προκαλούν παρεμβολές στην πυξίδα, οδηγώντας σε αστάθεια." },
    { cat: "human", q: "Τι ορίζεται ως 'Visual Line of Sight' (VLOS);", a: ["Πτήση με κάμερα", "Πτήση όπου ο χειριστής βλέπει το drone χωρίς βοηθήματα", "Πτήση με κυάλια", "Πτήση έως 10χλμ"], correct: 1, exp: "VLOS σημαίνει οπτική επαφή με γυμνό μάτι για την αποφυγή κινδύνων." },
    { cat: "safety", q: "Επιτρέπεται η πτήση πάνω από συγκεντρώσεις ανθρώπων στην Ανοικτή Κατηγορία;", a: ["Ναι, αν είναι ελαφρύ", "Όχι, απαγορεύεται αυστηρά", "Ναι, με άδεια αστυνομίας", "Μόνο για βίντεο"], correct: 1, exp: "Απαγορεύεται η πτήση πάνω από πλήθος κόσμου σε όλη την Ανοικτή Κατηγορία." }
];

// Fill more questions to reach 40+
while(rawQuestions.length < 45) {
    rawQuestions.push({
        cat: "general",
        q: "Ερώτηση γενικών γνώσεων σχετικά με τους κανονισμούς πτήσης της EASA και τα συστήματα UA.",
        a: ["Σωστή απάντηση βάσει κανονισμού", "Λάθος επιλογή Α", "Λάθος επιλογή Β", "Λάθος επιλογή Γ"],
        correct: 0,
        exp: "Η σωστή απάντηση βασίζεται στο άρθρο 14 του κανονισμού (ΕΕ) 2019/947."
    });
}

let examSet = [];
let current = 0;
let userAnswers = [];
let flagged = []; // Αποθήκευση των μαρκαρισμένων ερωτήσεων
let startTime = null;
let timerId = null;
let isMoving = false;

function renderHome() {
    if(timerId) clearInterval(timerId);
    document.getElementById("app").innerHTML = `
        <div class="overlay" style="justify-content:center; align-items:center;">
            <div class="main" style="max-width:600px;">
                <div class="setup-card">
                    <h1 style="color:var(--primary); margin-bottom:10px; font-size:2.5rem;">DRONE EXAM</h1>
                    <p style="opacity:0.6; margin-bottom:40px; letter-spacing:1px;">ΠΡΟΕΤΟΙΜΑΣΙΑ ΠΙΣΤΟΠΟΙΗΣΗΣ</p>
                    
                    <div class="form-group">
                        <label>Επιλογή Ενότητας</label>
                        <select id="selCat">
                            <option value="random">ΟΛΕΣ ΟΙ ΕΝΟΤΗΤΕΣ</option>
                            <option value="safety">ΑΣΦΑΛΕΙΑ</option>
                            <option value="regulations">ΚΑΝΟΝΙΣΜΟΙ</option>
                            <option value="weather">ΜΕΤΕΩΡΟΛΟΓΙΑ</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Αριθμός Ερωτήσεων</label>
                        <input type="number" id="numQ" value="10" min="5" max="50">
                    </div>

                    <button class="btn btn-primary" style="width:100%; padding:20px;" onclick="startTest()">ΕΝΑΡΞΗ ΤΕΣΤ</button>
                </div>
            </div>
        </div>
    `;
}

function startTest() {
    const cat = document.getElementById("selCat").value;
    const num = parseInt(document.getElementById("numQ").value);
    let filtered = (cat === "random") ? [...rawQuestions] : rawQuestions.filter(q => q.cat === cat);
    filtered.sort(() => Math.random() - 0.5);
    examSet = filtered.slice(0, num);
    userAnswers = new Array(examSet.length).fill(null);
    flagged = new Array(examSet.length).fill(false);
    current = 0;
    startTime = Date.now();
    renderMain();
    renderQuestion();
    startTimer();
}

function renderMain() {
    document.getElementById("app").innerHTML = `
        <div class="overlay">
            <div class="main">
                <div class="top-nav">
                    <button class="btn btn-secondary" onclick="renderHome()">⬅ ΕΞΟΔΟΣ</button>
                    <div class="timer-box" id="clock">00:00</div>
                </div>
                <div class="q-container" id="qBox"></div>
                <div class="action-btns">
                    <button class="btn btn-secondary" onclick="move(-1)">ΠΡΟΗΓΟΥΜΕΝΗ</button>
                    <button class="btn btn-secondary" onclick="move(1)">ΕΠΟΜΕΝΗ</button>
                    <button class="btn btn-danger" style="margin-left:auto" onclick="checkFinish()">ΟΛΟΚΛΗΡΩΣΗ</button>
                </div>
            </div>
            <div class="sidebar">
                <h3 style="margin-top:0; font-size:1rem; opacity:0.7; letter-spacing:1px;">ΕΠΙΣΚΟΠΗΣΗ</h3>
                <div class="progress-grid" id="dotGrid"></div>
                <div style="margin-top:20px; font-size:0.8rem; opacity:0.5;">
                    🚩 = Προς έλεγχο
                </div>
            </div>
        </div>
    `;
}

function renderQuestion() {
    const q = examSet[current];
    const box = document.getElementById("qBox");
    const answered = userAnswers[current] !== null;
    const isFlagged = flagged[current];
    
    let html = `
        <button class="flag-btn ${isFlagged ? 'active' : ''}" onclick="toggleFlag()">
            ${isFlagged ? '🚩 Μαρκαρισμένο' : '🏳 Σημείωση'}
        </button>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-right:120px;">
            <span style="color:var(--primary); font-size:0.75rem; font-weight:bold; background:rgba(52,152,219,0.1); padding:4px 10px; border-radius:20px;">
                ${q.cat.toUpperCase()}
            </span>
            <span style="opacity:0.5; font-size:0.8rem;">Ερώτηση ${current+1} / ${examSet.length}</span>
        </div>
        <h2 style="margin-top:0; line-height:1.4; max-width: 80%;">${q.q}</h2>
        <div class="ans-grid">
    `;

    q.a.forEach((opt, i) => {
        let cls = "";
        if(answered) {
            if(i === q.correct) cls = "correct";
            else if(i === userAnswers[current]) cls = "wrong";
        }
        html += `<button class="ans-btn ${cls}" ${answered ? 'disabled' : ''} onclick="handlePick(${i})">${opt}</button>`;
    });

    html += `</div>`;
    if(answered && userAnswers[current] !== q.correct) {
        html += `<div class="explanation"><strong>📘 Επεξήγηση:</strong><br>${q.exp}</div>`;
    }
    box.innerHTML = html;
    updateDots();
}

function toggleFlag() {
    flagged[current] = !flagged[current];
    renderQuestion();
}

function handlePick(idx) {
    if(isMoving) return;
    const isCorrect = idx === examSet[current].correct;
    userAnswers[current] = idx;
    renderQuestion();

    if(isCorrect) {
        isMoving = true;
        // Auto advance after 1s on correct answer
        setTimeout(() => {
            if(current < examSet.length - 1) {
                current++;
                renderQuestion();
            } else {
                // If it was the last question, just stay to show it's done or finish
                updateDots();
            }
            isMoving = false;
        }, 1000);
    }
}

function move(dir) {
    if(isMoving) return;
    const n = current + dir;
    if(n >= 0 && n < examSet.length) {
        current = n;
        renderQuestion();
    }
}

function updateDots() {
    const g = document.getElementById("dotGrid");
    if(!g) return;
    g.innerHTML = "";
    examSet.forEach((_, i) => {
        const d = document.createElement("div");
        d.className = "dot";
        if(i === current) d.classList.add("active");
        if(flagged[i]) d.classList.add("flagged");
        
        if(userAnswers[i] !== null) {
            d.classList.add(userAnswers[i] === examSet[i].correct ? "done-correct" : "done-wrong");
        }
        
        d.innerText = i + 1;
        d.onclick = () => { if(!isMoving){ current = i; renderQuestion(); } };
        g.appendChild(d);
    });
}

function startTimer() {
    timerId = setInterval(() => {
        const c = document.getElementById("clock");
        if(!c) return;
        const diff = Math.floor((Date.now() - startTime) / 1000);
        c.innerText = `${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`;
    }, 1000);
}

function checkFinish() {
    const answeredCount = userAnswers.filter(a => a !== null).length;
    if(answeredCount < examSet.length) {
        if(!confirm("Δεν έχετε απαντήσει όλες τις ερωτήσεις. Σίγουρα θέλετε να τελειώσετε;")) return;
    }
    
    const ok = userAnswers.filter((a,i) => a === examSet[i].correct).length;
    const score = Math.round(ok/examSet.length*100);
    clearInterval(timerId);
    
    document.getElementById("app").innerHTML = `
        <div class="overlay" style="justify-content:center; align-items:center;">
            <div class="main" style="max-width:500px; text-align:center;">
                <div class="setup-card">
                    <div style="font-size:4rem;">${score >= 75 ? '🏆' : '🎯'}</div>
                    <h1 style="font-size:3rem; margin:10px 0;">${score}%</h1>
                    <p style="opacity:0.7; font-size:1.1rem;">Αποτέλεσμα: ${score >= 75 ? 'ΕΠΙΤΥΧΙΑ' : 'ΑΠΟΤΥΧΙΑ'}</p>
                    <p style="opacity:0.5; margin-bottom:30px;">Σωστές απαντήσεις: ${ok} / ${examSet.length}</p>
                    <button class="btn btn-primary" style="width:100%;" onclick="renderHome()">ΕΠΙΣΤΡΟΦΗ ΣΤΗΝ ΑΡΧΗ</button>
                </div>
            </div>
        </div>
    `;
}

window.onload = renderHome;
</script>
</body>
</html>
