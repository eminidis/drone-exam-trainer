<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Trainer - Official Questions</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --flag: #f39c12;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: white;
            line-height: 1.6;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .sidebar {
            width: 320px;
            background: var(--card-bg);
            border-left: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
        }

        .q-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            position: relative;
            margin-bottom: 20px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(52, 152, 219, 0.2);
            color: var(--primary);
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 25px;
            color: #ececec;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 16px 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            color: #ddd;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05rem;
        }

        .option-btn:hover:not(:disabled) {
            background: #333;
            border-color: var(--primary);
        }

        .option-btn.correct { background: var(--success) !important; color: #000; border-color: var(--success); font-weight: bold; }
        .option-btn.wrong { background: var(--danger) !important; border-color: var(--danger); }

        .flag-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: 1px solid #555;
            color: #888;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .flag-toggle.active {
            border-color: var(--flag);
            color: var(--flag);
            background: rgba(243, 156, 18, 0.1);
        }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .dot {
            aspect-ratio: 1;
            background: #2a2a2a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .dot.current { border-color: var(--primary); }
        .dot.correct { background: var(--success); color: #000; }
        .dot.wrong { background: var(--danger); }
        .dot.flagged::after { content: '🚩'; position: absolute; font-size: 0.6rem; top: -2px; right: -2px; }
        .dot { position: relative; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: rgba(241, 196, 15, 0.1);
            border-left: 4px solid var(--warning);
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid #444; color: white; }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        select, input {
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            margin: 10px 0;
            width: 250px;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
// ΠΡΑΓΜΑΤΙΚΕΣ ΕΡΩΤΗΣΕΙΣ ΧΩΡΙΣ PLACEHOLDERS
const questionBank = [
    { cat: "SAFETY", q: "Ποια είναι η ελάχιστη οριζόντια απόσταση από μη εμπλεκόμενα πρόσωπα στην υποκατηγορία Α2 χωρίς περιορισμό ταχύτητας;", a: ["5 μέτρα", "10 μέτρα", "30 μέτρα", "50 μέτρα"], correct: 2, exp: "Στην Α2 η κανονική απόσταση είναι 30 μέτρα. Μειώνεται στα 5μ μόνο αν το drone έχει Low Speed Mode." },
    { cat: "REGULATIONS", q: "Ποιο είναι το μέγιστο επιτρεπόμενο ύψος πτήσης στην Ανοικτή Κατηγορία;", a: ["100 μέτρα", "120 μέτρα", "150 μέτρα", "500 μέτρα"], correct: 1, exp: "Το μέγιστο ύψος είναι 120 μέτρα (400 πόδια) από το έδαφος." },
    { cat: "WEATHER", q: "Πώς επηρεάζει ο θερμός αέρας την απόδοση ενός Drone;", a: ["Αυξάνει την άντωση", "Μειώνει την πυκνότητα του αέρα και την άντωση", "Δεν επηρεάζει την πτήση", "Κάνει την μπαταρία να διαρκεί περισσότερο"], correct: 1, exp: "Ο θερμός αέρας είναι λιγότερο πυκνός, άρα οι έλικες έχουν λιγότερο 'αέρα' να σπρώξουν για να σηκώσουν το βάρος." },
    { cat: "SAFETY", q: "Επιτρέπεται η πτήση πάνω από συγκεντρώσεις ανθρώπων στην Ανοικτή Κατηγορία;", a: ["Ναι, αν το drone είναι κάτω από 250g", "Όχι, απαγορεύεται σε όλες τις υποκατηγορίες", "Ναι, μόνο για επαγγελματική χρήση", "Μόνο με άδεια της αστυνομίας"], correct: 1, exp: "Η πτήση πάνω από πλήθος (συναυλίες, πορείες, κλπ) απαγορεύεται αυστηρά." },
    { cat: "TECHNICAL", q: "Τι προκαλεί παρεμβολές στην πυξίδα (Magnetometer) του Drone;", a: ["Ο άνεμος", "Μεταλλικές κατασκευές και καλώδια υψηλής τάσης", "Η έλλειψη σήματος GPS", "Η υψηλή υγρασία"], correct: 1, exp: "Τα μέταλλα και ο ηλεκτρομαγνητισμός επηρεάζουν το μαγνητικό πεδίο που διαβάζει η πυξίδα." },
    { cat: "HUMAN", q: "Πώς επηρεάζει η κόπωση τον χειριστή;", a: ["Αυξάνει την εγρήγορση", "Μειώνει τους χρόνους αντίδρασης και την κρίση", "Βελτιώνει τον συντονισμό", "Δεν έχει σημασία για σύντομες πτήσεις"], correct: 1, exp: "Η κόπωση είναι κρίσιμος παράγοντας λάθους και μειώνει την αντίληψη του κινδύνου." },
    { cat: "REGULATIONS", q: "Ποια είναι η ελάχιστη ηλικία χειριστή στην Ανοικτή Κατηγορία;", a: ["14 έτη", "16 έτη", "18 έτη", "21 έτη"], correct: 1, exp: "Η γενική ελάχιστη ηλικία στην ΕΕ είναι τα 16 έτη (με κάποιες εξαιρέσεις για παιχνίδια)." },
    { cat: "WEATHER", q: "Τι είναι το 'Wind Shear' (Διατμητικός Άνεμος);", a: ["Σταθερός αέρας", "Απότομη αλλαγή ταχύτητας ή κατεύθυνσης ανέμου", "Άνεμος που πνέει μόνο πάνω από τη θάλασσα", "Τεχνικός όρος για την ταχύτητα του drone"], correct: 1, exp: "Ο διατμητικός άνεμος είναι επικίνδυνος γιατί μπορεί να ρίξει το drone ξαφνικά." },
    { cat: "SAFETY", q: "Τι πρέπει να κάνει ο χειριστής αν εμφανιστεί επανδρωμένο αεροσκάφος;", a: ["Να πετάξει πιο ψηλά", "Να δώσει προτεραιότητα και να κατέβει αμέσως χαμηλά ή να προσγειωθεί", "Να πλησιάσει για να τον δει ο πιλότος", "Να συνεχίσει την πτήση κανονικά"], correct: 1, exp: "Τα επανδρωμένα αεροσκάφη (ελικόπτερα, αεροπλάνα) έχουν πάντα απόλυτη προτεραιότητα." },
    { cat: "TECHNICAL", q: "Ποιο είναι το πλεονέκτημα της μπαταρίας LiPo;", a: ["Είναι πολύ βαριές", "Έχουν υψηλή ενεργειακή πυκνότητα για το βάρος τους", "Δεν χρειάζονται φόρτιση", "Δουλεύουν καλύτερα όταν είναι άδειες"], correct: 1, exp: "Οι LiPo προσφέρουν μεγάλη ισχύ σε μικρό βάρος, αλλά θέλουν προσοχή στη συντήρηση." }
];

let examSet = [];
let currentIdx = 0;
let userAnswers = [];
let flags = [];
let timer = 0;
let timerInterval;

function initHome() {
    document.getElementById('app').innerHTML = `
        <div class="welcome">
            <h1 style="font-size: 3rem; margin-bottom: 0;">Drone Exam Trainer</h1>
            <p style="opacity: 0.6; margin-bottom: 40px;">Προετοιμασία για Πιστοποιητικό A1-A3 / A2</p>
            
            <div style="background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #333;">
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:5px; font-size:0.8rem; color:var(--primary);">ΕΝΟΤΗΤΑ</label>
                    <select id="categorySelect">
                        <option value="ALL">ΟΛΕΣ ΟΙ ΕΡΩΤΗΣΕΙΣ</option>
                        <option value="SAFETY">ΑΣΦΑΛΕΙΑ</option>
                        <option value="REGULATIONS">ΝΟΜΟΘΕΣΙΑ</option>
                        <option value="TECHNICAL">ΤΕΧΝΙΚΑ</option>
                        <option value="WEATHER">ΚΑΙΡΟΣ</option>
                        <option value="HUMAN">ΑΝΘΡΩΠΙΝΟΣ ΠΑΡΑΓΟΝΤΑΣ</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 30px;">
                    <label style="display:block; margin-bottom:5px; font-size:0.8rem; color:var(--primary);">ΑΡΙΘΜΟΣ ΕΡΩΤΗΣΕΩΝ</label>
                    <input type="number" id="countInput" value="10" min="1" max="40">
                </div>

                <button class="btn btn-primary" style="width: 100%; padding: 15px;" onclick="startExam()">ΕΝΑΡΞΗ ΤΕΣΤ</button>
            </div>
        </div>
    `;
}

function startExam() {
    const cat = document.getElementById('categorySelect').value;
    const count = parseInt(document.getElementById('countInput').value);
    
    // Φιλτράρισμα - Μόνο αληθινές ερωτήσεις
    let pool = (cat === "ALL") ? [...questionBank] : questionBank.filter(q => q.cat === cat);
    pool.sort(() => Math.random() - 0.5);
    
    // Το μέγεθος του τεστ δεν μπορεί να είναι μεγαλύτερο από τις διαθέσιμες ερωτήσεις
    const finalCount = Math.min(count, pool.length);
    examSet = pool.slice(0, finalCount);
    
    userAnswers = new Array(examSet.length).fill(null);
    flags = new Array(examSet.length).fill(false);
    currentIdx = 0;
    timer = 0;
    
    renderExamLayout();
    renderQuestion();
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timer++;
        const mins = Math.floor(timer/60).toString().padStart(2, '0');
        const secs = (timer%60).toString().padStart(2, '0');
        document.getElementById('timerDisplay').innerText = `${mins}:${secs}`;
    }, 1000);
}

function renderExamLayout() {
    document.getElementById('app').innerHTML = `
        <div class="layout">
            <div class="main-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                    <button class="btn btn-outline" onclick="initHome()">← ΑΡΧΙΚΗ</button>
                    <div id="timerDisplay" style="font-family: monospace; font-size: 1.5rem; color: var(--warning);">00:00</div>
                </div>

                <div id="questionContainer"></div>

                <div class="controls">
                    <button class="btn btn-outline" onclick="changeQ(-1)">ΠΡΟΗΓΟΥΜΕΝΗ</button>
                    <button class="btn btn-outline" onclick="changeQ(1)">ΕΠΟΜΕΝΗ</button>
                    <button class="btn btn-danger" style="margin-left:auto;" onclick="finishExam()">ΟΛΟΚΛΗΡΩΣΗ</button>
                </div>
            </div>
            
            <div class="sidebar">
                <h3 style="margin-top:0;">ΠΡΟΟΔΟΣ</h3>
                <div class="progress-grid" id="dotGrid"></div>
                <div style="margin-top:30px; border-top:1px solid #333; padding-top:20px; font-size:0.8rem; opacity:0.6;">
                    <p>🟢 Σωστό | 🔴 Λάθος</p>
                    <p>🚩 Σημειωμένη ερώτηση</p>
                </div>
            </div>
        </div>
    `;
}

function renderQuestion() {
    const q = examSet[currentIdx];
    const container = document.getElementById('questionContainer');
    const isAnswered = userAnswers[currentIdx] !== null;
    
    container.innerHTML = `
        <div class="q-card">
            <button class="flag-toggle ${flags[currentIdx] ? 'active' : ''}" onclick="toggleFlag()">
                ${flags[currentIdx] ? '🚩 Σημειωμένη' : '🏳 Σημείωση'}
            </button>
            <div class="tag">${q.cat}</div>
            <div style="margin-bottom:10px; opacity:0.5; font-size:0.8rem;">Ερώτηση ${currentIdx + 1} από ${examSet.length}</div>
            <div class="question-text">${q.q}</div>
            
            <div class="options-list">
                ${q.a.map((opt, i) => {
                    let stateClass = "";
                    if (isAnswered) {
                        if (i === q.correct) stateClass = "correct";
                        else if (i === userAnswers[currentIdx]) stateClass = "wrong";
                    }
                    return `<button class="option-btn ${stateClass}" ${isAnswered ? 'disabled' : ''} onclick="pickAnswer(${i})">${opt}</button>`;
                }).join('')}
            </div>

            ${isAnswered ? `
                <div class="explanation">
                    <strong>Γιατί;</strong><br>
                    ${q.exp}
                </div>
            ` : ''}
        </div>
    `;
    updateSidebar();
}

function pickAnswer(idx) {
    userAnswers[currentIdx] = idx;
    renderQuestion();
    
    // Αυτόματη μετάβαση μετά από 1.5 δευτερόλεπτο αν είναι σωστό
    if(idx === examSet[currentIdx].correct) {
        setTimeout(() => {
            if(currentIdx < examSet.length - 1) changeQ(1);
        }, 1500);
    }
}

function toggleFlag() {
    flags[currentIdx] = !flags[currentIdx];
    renderQuestion();
}

function changeQ(step) {
    const next = currentIdx + step;
    if (next >= 0 && next < examSet.length) {
        currentIdx = next;
        renderQuestion();
    }
}

function updateSidebar() {
    const grid = document.getElementById('dotGrid');
    if(!grid) return;
    grid.innerHTML = examSet.map((_, i) => {
        let cls = "dot";
        if (i === currentIdx) cls += " current";
        if (userAnswers[i] !== null) {
            cls += (userAnswers[i] === examSet[i].correct) ? " correct" : " wrong";
        }
        if (flags[i]) cls += " flagged";
        return `<div class="${cls}" onclick="jumpTo(${i})">${i+1}</div>`;
    }).join('');
}

function jumpTo(i) {
    currentIdx = i;
    renderQuestion();
}

function finishExam() {
    const correct = userAnswers.filter((a, i) => a === examSet[i].correct).length;
    const score = Math.round((correct / examSet.length) * 100);
    const passed = score >= 75;

    clearInterval(timerInterval);

    document.getElementById('app').innerHTML = `
        <div class="welcome">
            <div class="q-card" style="width:400px;">
                <h1 style="color:${passed ? 'var(--success)' : 'var(--danger)'}">${score}%</h1>
                <h2>${passed ? 'ΕΠΙΤΥΧΙΑ!' : 'ΑΠΟΤΥΧΙΑ'}</h2>
                <p>Σωστές απαντήσεις: ${correct} από ${examSet.length}</p>
                <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="initHome()">ΝΕΑ ΠΡΟΣΠΑΘΕΙΑ</button>
            </div>
        </div>
    `;
}

window.onload = initHome;
</script>
</body>
</html>
