<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Pro 150</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .grid-dot { width: 32px; height: 32px; border-radius: 6px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border: 1px solid #334155; }
        .grid-dot.correct { background: #10b981 !important; border-color: #059669; }
        .grid-dot.wrong { background: #ef4444 !important; border-color: #b91c1c; }
        .grid-dot.marked { border: 2px solid #f59e0b; }
        .grid-dot.active { border: 2px solid #38bdf8; transform: scale(1.1); }
        .opt-btn { width: 100%; text-align: left; padding: 14px; border-radius: 12px; background: #1e293b; border: 1px solid #334155; display: flex; align-items: center; gap: 12px; transition: 0.2; }
        .opt-btn.correct { background: #065f46 !important; border-color: #10b981; }
        .opt-btn.wrong { background: #7f1d1d !important; border-color: #ef4444; }
        .hidden-section { display: none; }

</head>
<body class="p-4">

            <button onclick="showSection('exam-menu')" class="p-6 bg-purple-600 rounded-2xl font-bold text-xl shadow-lg">EXAM MODE</button>

        <button onclick="showSection('main-menu')" class="w-full text-slate-500 py-4">ΠΙΣΩ</button>

        </div>
        <button onclick="showSection('study-menu')" class="text-slate-500">ΠΙΣΩ</button>
    </div>

            </div>
            <div class="p-4 bg-slate-900 grid grid-cols-4 gap-2 border-t border-slate-700">

                <button onclick="toggleNote()" class="p-4 bg-slate-800 text-amber-500 rounded-xl text-xs font-bold">ΣΗΜΕΙΩΣΗ</button>

        </div>

        </div>

        <button onclick="location.reload()" class="w-full py-4 bg-sky-600 rounded-xl font-bold shadow-lg">ΕΠΙΣΤΡΟΦΗ</button>

];let currentQuiz = [];
let currentIdx = 0;
let userAnswers = {};
let quizMode = "";
let timerInterval;

function showSection(id) {
    document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden-section'));
    document.getElementById(id).classList.remove('hidden-section');
}

function openStudyOptions(category) {
    window.selectedCat = category;
    showSection('count-menu');
}

function initQuiz(mode, count) {
    quizMode = mode;
    currentIdx = 0;
    userAnswers = {};
    let pool = [...allQuestions];
    if (mode === 'STUDY') {
        if (window.selectedCat !== 'RANDOM') pool = pool.filter(q => q.c === window.selectedCat);
        pool.sort(() => Math.random() - 0.5);
        currentQuiz = count > 0 ? pool.slice(0, count) : pool;
    } else {
        currentQuiz = pool.sort(() => Math.random() - 0.5).slice(0, 40);
        startTimer(60 * 60);
    }
    renderGrid();
    showQuestion(0);
    showSection('quiz-container');
}function renderGrid() {
    const grid = document.getElementById('grid-dots');
    grid.innerHTML = "";
    currentQuiz.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = "grid-dot"; d.id = `dot-${i}`; d.innerText = i + 1;
        d.onclick = () => showQuestion(i);
        grid.appendChild(d);
    });
}

function showQuestion(idx) {
    currentIdx = idx;
    const q = currentQuiz[idx];
    document.querySelectorAll('.grid-dot').forEach(d => d.classList.remove('active'));
    document.getElementById(`dot-${idx}`).classList.add('active');
    document.getElementById('progress-header').innerText = `${idx+1} / ${currentQuiz.length}`;
    document.getElementById('question-text').innerText = q.q;
    const opts = document.getElementById('options-grid');
    opts.innerHTML = "";
    q.o.forEach((o, i) => {
        const b = document.createElement('button');
        b.className = "opt-btn";
        b.innerHTML = `<span class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center font-bold text-xs">${i+1}</span><span>${o}</span>`;
        if (userAnswers[idx]) {
            b.disabled = true;
            if (i === q.a) b.classList.add('correct');
            if (i === userAnswers[idx].choice && i !== q.a) b.classList.add('wrong');
        } else {
            b.onclick = () => {
                userAnswers[idx] = { choice: i, status: i === q.a ? 'correct' : 'wrong' };
                document.getElementById(`dot-${idx}`).classList.add(userAnswers[idx].status);
                showQuestion(idx);
            };
        }
        opts.appendChild(b);
    });
    const exp = document.getElementById('explanation-box');
    if (userAnswers[idx] && userAnswers[idx].status === 'wrong' && quizMode === 'STUDY') {
        document.getElementById('explanation-text').innerText = q.e;
        exp.classList.remove('hidden');
    } else { exp.classList.add('hidden'); }
}function toggleNote() { document.getElementById(`dot-${currentIdx}`).classList.toggle('marked'); }
function nextQuestion() { if (currentIdx < currentQuiz.length - 1) showQuestion(currentIdx + 1); }
function prevQuestion() { if (currentIdx > 0) showQuestion(currentIdx - 1); }

function startTimer(s) {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        let m = Math.floor(s / 60); let sec = s % 60;
        document.getElementById('timer').innerText = `${m}:${sec < 10 ? '0' : ''}${sec}`;
        if (s-- <= 0) finishQuiz(true);
    }, 1000);
}

function finishQuiz(force = false) {
    if (!force && !confirm("Θέλετε να τερματίσετε το τεστ;")) return;
    clearInterval(timerInterval);
    let ok = Object.values(userAnswers).filter(a => a.status === 'correct').length;
    document.getElementById('res-correct').innerText = ok;
    document.getElementById('res-wrong').innerText = currentQuiz.length - ok;
    const pass = (ok / currentQuiz.length) >= 0.75;
    document.getElementById('res-status').innerText = pass ? "ΑΠΟΤΕΛΕΣΜΑ: ΕΠΙΤΥΧΙΑ" : "ΑΠΟΤΕΛΕΣΜΑ: ΑΠΟΤΥΧΙΑ";
    document.getElementById('res-status').style.color = pass ? "#10b981" : "#ef4444";
    showSection('results-screen');
}

function confirmExit() { if (confirm("Επιστροφή στο μενού; Η πρόοδος θα χαθεί.")) location.reload(); }
showSection('main-menu');
</script>
