<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Drone Exam Trainer</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("background.jpg") center/cover no-repeat fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
padding:40px;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:30px;
}

.menu{
text-align:center;
}

button{
padding:14px 22px;
margin:6px;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;
}

.studyBtn{background:#2ecc71;color:white;}
.examBtn{background:#3498db;color:white;}

.toolbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.progress{
height:10px;
background:#444;
border-radius:5px;
overflow:hidden;
margin-bottom:20px;
}

.progressBar{
height:100%;
background:#2ecc71;
width:0%;
}

.question{
font-size:22px;
margin-bottom:20px;
}

.answers button{
display:block;
width:100%;
text-align:left;
background:#333;
color:white;
margin-bottom:10px;
}

.correct{background:#2ecc71!important;}
.wrong{background:#e74c3c!important;}

.grid{
position:absolute;
top:20px;
right:20px;
display:grid;
grid-template-columns:repeat(5,40px);
gap:6px;
}

.grid div{
width:40px;
height:40px;
background:#555;
display:flex;
align-items:center;
justify-content:center;
border-radius:5px;
font-size:14px;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}

.marked::after{
content:"!";
color:yellow;
font-weight:bold;
margin-left:3px;
}

.timer{
font-size:18px;
}

.result{
text-align:center;
font-size:22px;
}

</style>
</head>

<body>

<div class="overlay" id="app">

<h1>Drone Exam Trainer</h1>

<div class="menu" id="menu">

<button class="studyBtn" onclick="startStudy()">Έναρξη Μελέτης</button>
<button class="examBtn">Εξέταση</button>

</div>

</div>

<script>

let questions=[

{
q:"Ποια είναι η μέγιστη απόσταση πτήσης στην Open Category;",
a:["Απεριόριστη","Εντός VLOS","50km","100m"],
correct:1,
cat:"Airlaw"
},

{
q:"Τι σημαίνει VLOS;",
a:["Visual Line of Sight","Very Long Operating System","Vision Link","Visual Level"],
correct:0,
cat:"Airlaw"
},

{
q:"Ο άνεμος επηρεάζει το drone;",
a:["Τη σταθερότητα","Την μπαταρία","Και τα δύο","Τίποτα"],
correct:2,
cat:"Meteorology"
}

]

let current=0
let answers=[]
let marked=[]
let startTime
let timerInterval

function startStudy(){

startTime=Date.now()

document.getElementById("app").innerHTML=`

<div class="toolbar">

<div class="timer" id="timer">00:00</div>

<div>
<button onclick="menu()">Μενού</button>
<button onclick="prev()">Προηγούμενη</button>
<button onclick="next()">Επόμενη</button>
<button onclick="mark()">Σημείωση</button>
<button onclick="finish()">Τερματισμός</button>
</div>

</div>

<div class="progress">
<div class="progressBar" id="progressBar"></div>
</div>

<div class="question" id="question"></div>

<div class="answers" id="answers"></div>

<div class="grid" id="grid"></div>

`

render()
startTimer()

}

function render(){

let q=questions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let answersDiv=document.getElementById("answers")
answersDiv.innerHTML=""

q.a.forEach((ans,i)=>{

let btn=document.createElement("button")
btn.innerText=ans

btn.onclick=()=>answer(i,btn)

answersDiv.appendChild(btn)

})

renderGrid()
updateProgress()

}

function answer(i,btn){

if(answers[current]!=undefined)return

answers[current]=i

if(i==questions[current].correct){
btn.classList.add("correct")
setTimeout(()=>next(),600)
}else{
btn.classList.add("wrong")
}

renderGrid()

}

function next(){
if(current<questions.length-1){
current++
render()
}else{
finishPrompt()
}
}

function prev(){
if(current>0){
current--
render()
}
}

function mark(){
if(!marked.includes(current)){
marked.push(current)
}else{
marked=marked.filter(x=>x!=current)
}
renderGrid()
}

function renderGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

questions.forEach((q,i)=>{

let box=document.createElement("div")
box.innerText=i+1

if(answers[i]!=undefined){

if(answers[i]==questions[i].correct){
box.classList.add("green")
}else{
box.classList.add("red")
}

}

if(marked.includes(i)){
box.classList.add("marked")
}

box.onclick=()=>{
current=i
render()
}

grid.appendChild(box)

})

}

function updateProgress(){

let done=answers.filter(x=>x!=undefined).length
let percent=(done/questions.length)*100

document.getElementById("progressBar").style.width=percent+"%"

}

function startTimer(){

timerInterval=setInterval(()=>{

let sec=Math.floor((Date.now()-startTime)/1000)
let m=Math.floor(sec/60)
let s=sec%60

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

},1000)

}

function finishPrompt(){

if(confirm("Έχεις απαντήσει όλες τις ερωτήσεις. Θέλεις να τερματίσεις το τεστ;")){
finish()
}

}

function finish(){

clearInterval(timerInterval)

let correct=0

answers.forEach((a,i)=>{
if(a==questions[i].correct)correct++
})

let wrong=answers.length-correct

let time=document.getElementById("timer").innerText

document.getElementById("app").innerHTML=`

<h1>Αποτελέσματα</h1>

<div class="result">

Σωστές απαντήσεις: ${correct} <br><br>

Λάθος απαντήσεις: ${wrong} <br><br>

Σημειωμένες: ${marked.length} <br><br>

Χρόνος: ${time} <br><br>

<button onclick="practiceWrong()">Εξάσκηση Λάθος Ερωτήσεων</button>

<button onclick="menu()">Επιστροφή στο Μενού</button>

</div>

`

}

function practiceWrong(){

let wrongQuestions=questions.filter((q,i)=>answers[i]!=q.correct)

questions=wrongQuestions

answers=[]
marked=[]
current=0

startStudy()

}

function menu(){
location.reload()
}

</script>

</body>
</html>
