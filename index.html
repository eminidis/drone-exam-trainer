<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .grid-dot { width: 35px; height: 35px; border-radius: 8px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border: 1px solid #334155; transition: 0.2s; }
        .grid-dot.correct { background: #10b981 !important; border-color: #059669; }
        .grid-dot.wrong { background: #ef4444 !important; border-color: #b91c1c; }
        .grid-dot.active { border: 2px solid #38bdf8; background: #1e293b; transform: scale(1.1); }
        .opt-btn { width: 100%; text-align: left; padding: 16px; border-radius: 12px; background: #1e293b; border: 1px solid #334155; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .opt-btn:hover:not(:disabled) { background: #334155; }
        .opt-btn.correct { background: #059669 !important; border-color: #10b981; color: white; }
        .opt-btn.wrong { background: #991b1b !important; border-color: #ef4444; color: white; }
        .hidden-section { display: none; }
        #grid-dots::-webkit-scrollbar { width: 6px; }
        #grid-dots::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div id="main-menu" class="max-w-md mx-auto mt-10 space-y-6 text-center">
        <h1 class="text-4xl font-black text-sky-400 tracking-tighter">DRONE EXAM PRO</h1>
        <div class="space-y-4">
            <button onclick="showSection('study-menu')" class="w-full py-6 bg-sky-600 rounded-2xl font-bold text-xl shadow-lg hover:bg-sky-500 transition">STUDY MODE</button>
            <button onclick="showSection('exam-menu')" class="w-full py-6 bg-purple-600 rounded-2xl font-bold text-xl shadow-lg hover:bg-purple-500 transition">EXAM MODE</button>
        </div>
    </div>

    <div id="study-menu" class="hidden-section max-w-md mx-auto mt-10 space-y-4">
        <h2 class="text-xl font-bold mb-4 text-center text-sky-400">ΕΠΙΛΟΓΗ ΕΝΟΤΗΤΑΣ ΕΞΑΣΚΗΣΗΣ</h2>
        <button onclick="startQuiz('STUDY', 'ΚΑΝΟΝΙΣΜΟΙ')" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 text-left hover:border-sky-500 transition">1. ΚΑΝΟΝΙΣΜΟΙ</button>
        <button onclick="startQuiz('STUDY', 'ΑΣΦΑΛΕΙΑ')" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 text-left hover:border-sky-500 transition">2. ΑΣΦΑΛΕΙΑ</button>
        <button onclick="startQuiz('STUDY', 'ΠΕΡΙΒΑΛΛΟΝ')" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 text-left hover:border-sky-500 transition">3. ΠΕΡΙΒΑΛΛΟΝ</button>
        <button onclick="startQuiz('STUDY', 'ALL')" class="w-full p-4 bg-slate-700 rounded-xl border border-slate-600 text-center font-bold hover:bg-slate-600 transition">ΟΛΕΣ ΟΙ ΕΝΟΤΗΤΕΣ</button>
        <button onclick="startQuiz('STUDY', 'RANDOM')" class="w-full p-4 bg-amber-600 rounded-xl font-bold text-center hover:bg-amber-500 transition">ΤΥΧΑΙΑ (RANDOM)</button>
        <button onclick="showSection('main-menu')" class="w-full p-2 text-slate-500 italic">ΕΠΙΣΤΡΟΦΗ</button>
    </div>

    <div id="exam-menu" class="hidden-section max-w-md mx-auto mt-10 space-y-4 text-center">
        <h2 class="text-xl font-bold text-purple-400">EXAM MODE</h2>
        <p class="text-slate-400">Πόσες ερωτήσεις θέλεις στην εξέταση;</p>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="startQuiz('EXAM', 'ALL', 20)" class="p-4 bg-slate-800 rounded-xl border border-slate-700 hover:border-purple-500 transition">20</button>
            <button onclick="startQuiz('EXAM', 'ALL', 40)" class="p-4 bg-slate-800 rounded-xl border border-slate-700 hover:border-purple-500 transition">40</button>
            <button onclick="startQuiz('EXAM', 'ALL', 80)" class="p-4 bg-slate-800 rounded-xl border border-slate-700 hover:border-purple-500 transition">80</button>
            <button onclick="startQuiz('EXAM', 'ALL', 120)" class="p-4 bg-slate-800 rounded-xl border border-slate-700 hover:border-purple-500 transition">120</button>
        </div>
        <button onclick="showSection('main-menu')" class="w-full p-2 text-slate-500 italic mt-4">ΕΠΙΣΤΡΟΦΗ</button>
    </div>

    <div id="quiz-container" class="hidden-section max-w-6xl mx-auto flex flex-col lg:flex-row gap-8 mt-4">
        <div class="flex-1 space-y-4">
            <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                <span id="quiz-info" class="text-sky-400 font-bold text-xs tracking-widest uppercase"></span>
                <span id="progress-text" class="text-slate-400 font-mono text-xs"></span>
            </div>
            
            <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
                <h2 id="question-text" class="text-xl font-medium leading-relaxed"></h2>
            </div>

            <div id="options-grid" class="space-y-3"></div>

            <div id="explanation-box" class="hidden bg-slate-900 border-l-4 border-red-500 p-4 rounded-r-xl text-sm text-slate-300 italic">
                <span class="block text-red-500 font-bold not-italic mb-1 uppercase tracking-tighter">Εξήγηση:</span>
                <span id="explanation-text"></span>
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="prevQuestion()" class="flex-1 bg-slate-700 py-4 rounded-xl font-bold hover:bg-slate-600 transition">ΠΡΟΗΓΟΥΜΕΝΗ</button>
                <button onclick="showNote()" class="flex-1 bg-slate-800 py-4 rounded-xl font-bold border border-slate-600 hover:bg-slate-700 transition">ΣΗΜΕΙΩΣΗ</button>
                <button onclick="nextQuestion()" class="flex-1 bg-sky-600 py-4 rounded-xl font-bold hover:bg-sky-500 transition">ΕΠΟΜΕΝΗ</button>
            </div>
            <button onclick="location.reload()" class="w-full text-slate-500 text-xs mt-4 hover:text-white transition uppercase tracking-widest">ΕΞΟΔΟΣ ΣΤΟ ΜΕΝΟΥ</button>
        </div>

        <div class="w-full lg:w-80 bg-slate-800/30 p-4 rounded-2xl border border-slate-700">
            <h3 class="text-xs font-bold text-slate-500 mb-4 uppercase text-center tracking-widest border-b border-slate-700 pb-2">Πρόοδος</h3>
            <div id="grid-dots" class="grid grid-cols-6 sm:grid-cols-10 lg:grid-cols-5 gap-2 max-h-[600px] overflow-y-auto p-1"></div>
        </div>
    </div>

    <script>
        const allQuestions = [
            {"id":1,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Ποιο είναι το μέγιστο ύψος στην Ανοικτή Κατηγορία;","o":["50μ","120μ","150μ","Χωρίς όριο"],"a":1,"e":"Το μέγιστο ύψος πτήσης στην Ανοικτή Κατηγορία είναι τα 120 μέτρα (400 πόδια) από την επιφάνεια του εδάφους."},
            {"id":2,"c":"ΑΣΦΑΛΕΙΑ","q":"Ελάχιστη ηλικία χειριστή στην Ελλάδα για την Ανοικτή Κατηγορία;","o":["12","14","16","18"],"a":2,"e":"Στην Ελλάδα η ελάχιστη ηλικία είναι τα 16 έτη (εκτός αν πρόκειται για drone-παιχνίδι C0)."},
            {"id":3,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Ποια υποκατηγορία αφορά πτήσεις μακριά από ανθρώπους;","o":["Α1","Α2","Α3","Ειδική"],"a":2,"e":"Η Α3 αφορά πτήσεις μακριά από ανθρώπους και σε απόσταση 150μ από αστικές/βιομηχανικές περιοχές."},
            {"id":4,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι κάνουμε αν δούμε επανδρωμένο αεροσκάφος;","o":["Πετάμε ψηλότερα","Το ακολουθούμε","Προσγειωνόμαστε ή κατεβαίνουμε αμέσως","Τίποτα"],"a":2,"e":"Τα drones πρέπει πάντα να δίνουν προτεραιότητα και να παραχωρούν τον εναέριο χώρο στα επανδρωμένα."},
            {"id":5,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Πώς επηρεάζει ο ισχυρός άνεμος την μπαταρία του drone;","o":["Διαρκεί περισσότερο","Δεν την επηρεάζει","Την εξαντλεί γρηγορότερα","Την φορτίζει εν πτήσει"],"a":2,"e":"Ο αέρας αναγκάζει τα μοτέρ να δουλεύουν πιο έντονα για σταθεροποίηση, αυξάνοντας την κατανάλωση."},
            {"id":6,"c":"ΑΣΦΑΛΕΙΑ","q":"Επιτρέπεται η πτήση πάνω από πλήθος ανθρώπων;","o":["Ναι","Όχι","Μόνο αν έχουμε άδεια","Μόνο αν είναι μικρό"],"a":1,"e":"Απαγορεύεται αυστηρά η πτήση πάνω από συγκεντρώσεις ανθρώπων στην Ανοικτή Κατηγορία."},
            {"id":7,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι σημαίνει VLOS;","o":["Video Live On Screen","Visual Line Of Sight","Virtual Light Operation","Variable Link System"],"a":1,"e":"Visual Line Of Sight σημαίνει ότι ο χειριστής βλέπει το drone με τα μάτια του ανά πάσα στιγμή."},
            {"id":8,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι το Fail-safe;","o":["Λειτουργία κάμερας","Αυτόματη ενέργεια (π.χ. RTH) σε απώλεια σήματος","Είδος μπαταρίας","Τύπος έλικας"],"a":1,"e":"Σύστημα ασφαλείας που ενεργοποιείται αυτόματα όταν χαθεί η σύνδεση με το χειριστήριο."},
            {"id":9,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Ποιος είναι ο κίνδυνος πτήσης κοντά σε μεγάλες μεταλλικές κατασκευές;","o":["Σκουριά","Παρεμβολές στην πυξίδα και στο GPS","Δεν υπάρχει κίνδυνος","Καλύτερο σήμα"],"a":1,"e":"Τα μέταλλα προκαλούν μαγνητικές παρεμβολές στα συστήματα πλοήγησης του drone."},
            {"id":10,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Πού αναγράφεται ο αριθμός εγγραφής εκμεταλλευόμενου;","o":["Στο κουτί","Στο χειριστήριο","Πάνω στο drone","Μόνο στο κινητό"],"a":2,"e":"Ο κωδικός (Operator ID) πρέπει να επικολλάται πάνω στο σκάφος."},
            {"id":11,"c":"ΑΣΦΑΛΕΙΑ","q":"Πότε ελέγχουμε την κατάσταση των ελίκων;","o":["Κάθε μήνα","Μετά από πτώση","Πριν από κάθε πτήση","Ποτέ"],"a":2,"e":"Ο προ-πτητικός έλεγχος περιλαμβάνει πάντα την επιθεώρηση των ελίκων για ρωγμές."},
            {"id":12,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι κάνουμε αν η μπαταρία LiPo φαίνεται φουσκωμένη;","o":["Την πατάμε να ισιώσει","Συνεχίζουμε τη χρήση","Την αποσύρουμε αμέσως","Την φορτίζουμε γρήγορα"],"a":2,"e":"Μια φουσκωμένη μπαταρία είναι κατεστραμμένη και επικίνδυνη για ανάφλεξη."},
            {"id":13,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Επιτρέπεται η πτήση πάνω από στρατιωτικές εγκαταστάσεις;","o":["Ναι","Όχι","Μόνο την Κυριακή","Μόνο με χαμηλή ταχύτητα"],"a":1,"e":"Απαγορεύεται αυστηρά η πτήση πάνω από στρατιωτικές ζώνες."},

            {"id":16,"c":"ΑΣΦΑΛΕΙΑ","q":"Γιατί δεν πετάμε κοντά σε αεροδρόμια;","o":["Για το θόρυβο","Κίνδυνος σύγκρουσης και παρεμβολές","Απαγόρευση φωτογραφίας","Δεν έχει σήμα"],"a":1,"e":"Είναι ζώνες απαγόρευσης πτήσεων λόγω κινδύνου σύγκρουσης με αεροσκάφη."},
            {"id":17,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Ποιος έχει την κύρια ευθύνη για την ασφάλεια της πτήσης;","o":["Ο κατασκευαστής","Η ΥΠΑ","Ο χειριστής","Ο ιδιοκτήτης του χώρου"],"a":2,"e":"Ο τηλεχειριστής φέρει την αποκλειστική ευθύνη για την ασφαλή διεξαγωγή της πτήσης."},

            {"id":19,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Πώς επηρεάζει το κρύο τις μπαταρίες;","o":["Κρατάνε περισσότερο","Μειώνεται απότομα η απόδοση","Τις φορτίζει","Δεν τις επηρεάζει"],"a":1,"e":"Οι χαμηλές θερμοκρασίες μειώνουν τη χημική δραστηριότητα της μπαταρίας."},

            {"id":21,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι κάνουμε αν δούμε πουλιά να πλησιάζουν το drone;","o":["Τα ακολουθούμε","Απομακρυνόμαστε άμεσα","Πετάμε πιο κοντά","Κάνουμε θόρυβο"],"a":1,"e":"Τα πουλιά μπορεί να επιτεθούν στο drone, θεωρώντας το απειλή."},
            {"id":22,"c":"ΑΣΦΑΛΕΙΑ","q":"Ποιος είναι ο ρόλος του Παρατηρητή (Visual Observer);","o":["Να βγάζει φωτογραφίες","Να βοηθά τον χειριστή να βλέπει το drone και εμπόδια","Να κρατά την μπαταρία","Να ελέγχει το GPS"],"a":1,"e":"Βοηθά στη διατήρηση του VLOS και στην ανίχνευση κινδύνων στον αέρα."},

            {"id":24,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι δείχνει ο δείκτης K-Index;","o":["Ταχύτητα αέρα","Γεωμαγνητική δραστηριότητα (επηρεάζει το GPS)","Υγρασία","Θερμοκρασία"],"a":1,"e":"Μέτρηση της ηλιακής δραστηριότητας που επηρεάζει τη λήψη δορυφόρων."},
            {"id":25,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι είναι η τάση Storage (Αποθήκευσης) για μια LiPo;","o":["Είναι άδεια","Είναι στο 50-60% (περίπου 3.8V ανά στοιχείο)","Είναι γεμάτη","Είναι χαλασμένη"],"a":1,"e":"Η ιδανική τάση για την αποθήκευση των μπαταριών ώστε να μην αλλοιωθούν."},
            {"id":26,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Τι είναι το Remote ID;","o":["Ο κωδικός χειριστή","Σύστημα εκπομπής ταυτότητας και θέσης του drone","Διεύθυνση ιδιοκτήτη","Το όνομα WiFi"],"a":1,"e":"Η ψηφιακή ταυτότητα του drone που εκπέμπεται κατά την πτήση."},
            {"id":27,"c":"ΑΣΦΑΛΕΙΑ","q":"Πώς επηρεάζει η υπερβολική ζέστη τα ηλεκτρονικά;","o":["Πετάνε ταχύτερα","Κίνδυνος υπερθέρμανσης και παύσης λειτουργίας","Καλύτερη εικόνα","Δεν επηρεάζει"],"a":1,"e":"Η ζέστη μπορεί να προκαλέσει διακοπή λειτουργίας στα κυκλώματα."},
            {"id":28,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι κάνουμε αν το drone αρχίσει να τρέμει έντονα στον αέρα;","o":["Δίνουμε γκάζι","Προσγειωνόμαστε αμέσως και ελέγχουμε","Τίποτα","Κλείνουμε την κάμερα"],"a":1,"e":"Το τρέμουλο σημαίνει μηχανικό πρόβλημα ή πρόβλημα στις έλικες."},
            {"id":29,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Μέγιστο βάρος drone στην υποκατηγορία Α1 (C0);","o":["250g","900g","4kg","25kg"],"a":0,"e":"Τα drones κάτω των 250g ανήκουν στην κατηγορία C0."},

            {"id":31,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Πόσο συχνά πρέπει να ανανεώνεται η εγγραφή εκμεταλλευόμενου;","o":["Κάθε χρόνο","Κάθε 3 χρόνια","Κάθε 5 χρόνια","Ποτέ"],"a":1,"e":"Η εγγραφή εκμεταλλευόμενου στην ΥΠΑ έχει διάρκεια 3 έτη."},
            {"id":32,"c":"ΑΣΦΑΛΕΙΑ","q":"Τι σημαίνει 'Imu Calibration';","o":["Φόρτιση μπαταρίας","Βαθμονόμηση αισθητήρων ισορροπίας και επιτάχυνσης","Αλλαγή ελίκων","Ρύθμιση κάμερας"],"a":1,"e":"Ρύθμιση της μονάδας μέτρησης αδράνειας για σταθερή πτήση."},
            {"id":33,"c":"ΚΑΝΟΝΙΣΜΟΙ","q":"Επιτρέπεται η μεταφορά επικίνδυνων εμπορευμάτων στην Ανοικτή;","o":["Ναι","Όχι","Μόνο αν είναι μικρά","Μόνο με ειδική τσάντα"],"a":1,"e":"Απαγορεύεται η μεταφορά επικίνδυνων υλικών από drones της Ανοικτής Κατηγορίας."},

            {"id":240,"c":"ΠΕΡΙΒΑΛΛΟΝ","q":"Τι είναι το 'Air Turbulence' κοντά σε δέντρα;","o":["Σταθερός αέρας","Αναταράξεις που δημιουργούνται από το φύλλωμα","Βροχή","Κρύο"],"a":1,"e":"Ο αέρας γίνεται απρόβλεπτος πάνω από δασικές εκτάσεις."}
        );let currentQuiz = [];
        let currentIdx = 0;
        let userAnswers = {}; // {idx: {choice: X, status: 'correct'|'wrong', marked: bool}}
        let quizMode = ""; 
        let timerInterval;

        function showSection(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
        }

        function openStudyOptions(category) {
            window.selectedCategory = category;
            showSection('count-menu');
        }

        function initQuiz(mode, count) {
            quizMode = mode;
            currentIdx = 0;
            userAnswers = {};
            
            // Φιλτράρισμα ερωτήσεων
            let pool = [...allQuestions];
            if (quizMode === 'STUDY') {
                if (window.selectedCategory !== 'ALL' && window.selectedCategory !== 'RANDOM') {
                    pool = pool.filter(q => q.c === window.selectedCategory);
                }
                if (window.selectedCategory === 'RANDOM' || count > 0) {
                    pool.sort(() => Math.random() - 0.5);
                }
                currentQuiz = (count > 0) ? pool.slice(0, count) : pool;
            } else {
                // EXAM MODE: 40 Τυχαίες
                currentQuiz = pool.sort(() => Math.random() - 0.5).slice(0, 40);
                startTimer(60 * 60); // 60 λεπτά
            }

            renderGrid();
            showQuestion(0);
            showSection('quiz-container');
        }

        function renderGrid() {
            const grid = document.getElementById('grid-dots');
            grid.innerHTML = "";
            currentQuiz.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = "grid-dot";
                dot.id = `dot-${i}`;
                dot.innerText = i + 1;
                dot.onclick = () => showQuestion(i);
                grid.appendChild(dot);
            });
        }

        function showQuestion(idx) {
            currentIdx = idx;
            const q = currentQuiz[idx];
            
            // UI Updates
            document.querySelectorAll('.grid-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(`dot-${idx}`).classList.add('active');
            document.getElementById('progress-header').innerText = `ΕΡΩΤΗΣΗ ${idx + 1} / ${currentQuiz.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            const optionsDiv = document.getElementById('options-grid');
            optionsDiv.innerHTML = "";
            
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerHTML = `<span class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold">${String.fromCharCode(65 + i)}</span> <span>${opt}</span>`;
                
                // Αν έχει ήδη απαντηθεί
                if (userAnswers[idx]) {
                    btn.disabled = true;
                    if (i === q.a) btn.classList.add('correct');
                    if (i === userAnswers[idx].choice && i !== q.a) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                optionsDiv.appendChild(btn);
            });

            // Επεξήγηση (Μόνο στο Study Mode και αν είναι λάθος)
            const expBox = document.getElementById('explanation-box');
            if (userAnswers[idx] && userAnswers[idx].status === 'wrong' && quizMode === 'STUDY') {
                document.getElementById('explanation-text').innerText = q.e;
                expBox.classList.remove('hidden');
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(choice) {
            const q = currentQuiz[currentIdx];
            const isCorrect = (choice === q.a);
            
            userAnswers[currentIdx] = {
                choice: choice,
                status: isCorrect ? 'correct' : 'wrong'
            };

            // Update Grid Dot
            const dot = document.getElementById(`dot-${currentIdx}`);
            dot.classList.add(isCorrect ? 'correct' : 'wrong');

            showQuestion(currentIdx);
        }

        function toggleNote() {
            const dot = document.getElementById(`dot-${currentIdx}`);
            if (dot.classList.contains('marked')) {
                dot.classList.remove('marked');
            } else {
                dot.classList.add('marked');
            }
        }

        function nextQuestion() {
            if (currentIdx < currentQuiz.length - 1) showQuestion(currentIdx + 1);
        }

        function prevQuestion() {
            if (currentIdx > 0) showQuestion(currentIdx - 1);
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            let t = seconds;
            timerInterval = setInterval(() => {
                let m = Math.floor(t / 60);
                let s = t % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (t <= 0) { clearInterval(timerInterval); finishQuiz(true); }
                t--;
            }, 1000);
        }

        function finishQuiz(force = false) {
            if (!force) {
                if (!confirm("Θέλετε να ολοκληρώσετε το τεστ και να δείτε τα αποτελέσματα;")) return;
            }
            
            clearInterval(timerInterval);
            let correct = 0;
            Object.values(userAnswers).forEach(a => { if (a.status === 'correct') correct++; });
            
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-wrong').innerText = currentQuiz.length - correct;
            
            const score = (correct / currentQuiz.length) * 100;
            const status = document.getElementById('res-status');
            if (score >= 75) {
                status.innerText = "ΕΠΙΤΥΧΙΑ! (PASS)";
                status.className = "text-xl font-bold py-4 rounded-xl italic bg-green-900/20 text-green-400 border border-green-500/30";
            } else {
                status.innerText = "ΑΠΟΤΥΧΙΑ (FAIL)";
                status.className = "text-xl font-bold py-4 rounded-xl italic bg-red-900/20 text-red-400 border border-red-500/30";
            }
            
            showSection('results-screen');
        }

        function confirmExit() {
            if (confirm("Επιστροφή στο αρχικό μενού; Η πρόοδος θα χαθεί.")) location.reload();
        }

        // Initialize
        showSection('main-menu');
    </script>
</body>
</html>
