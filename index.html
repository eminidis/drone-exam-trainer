<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <main id="start-screen" class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-card rounded-3xl p-8 text-center shadow-2xl">
            <h1 class="text-4xl font-extrabold mb-2 text-blue-500">DRONE EXAM</h1>
            <p class="mb-8 text-slate-400">ΕΠΑΝΑΦΟΡΑ ΕΦΑΡΜΟΓΗΣ</p>
            <button onclick="startApp()" class="w-full py-4 bg-blue-600 rounded-xl font-bold text-white uppercase">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
