<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Exam Trainer - Πλήρες</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --dark-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #111 url('https://images.unsplash.com/photo-1508614589041-895b88991e3e?q=80&w=2000') center/cover no-repeat fixed;
            color: white;
            overflow-x: hidden;
        }

        .overlay {
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            backdrop-filter: blur(10px);
            background: var(--dark-bg);
        }

        .main {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .setup-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .timer-box {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--warning);
        }

        .q-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 300px;
        }

        .ans-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ans-btn {
            padding: 18px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: white;
            text-align: left;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .ans-btn:hover:not(:disabled) {
            background: rgba(52, 152, 219, 0.15);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .ans-btn.correct { background: var(--success) !important; border-color: var(--success); }
        .ans-btn.wrong { background: var(--danger) !important; border-color: var(--danger); }

        .sidebar {
            width: 300px;
            background: rgba(0,0,0,0.3);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            overflow-y: auto;
        }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .dot {
            aspect-ratio: 1;
            background: #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }

        .dot.active { border: 2px solid var(--primary); }
        .dot.done-correct { background: var(--success); }
        .dot.done-wrong { background: var(--danger); }

        .action-btns { display: flex; gap: 15px; }
        .btn { padding: 15px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #444; color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: rgba(241, 196, 15, 0.15);
            border-left: 4px solid var(--warning);
            border-radius: 4px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        @media (max-width: 1000px) {
            .overlay { flex-direction: column; }
            .sidebar { width: 100%; border-left: none; height: 200px; }
            .progress-grid { grid-template-columns: repeat(10, 1fr); }
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
// --- DATABASE ---
// Συνδυασμός όλων των ερωτήσεων από τα μέρη που συζητήσαμε
const rawQuestions = [
    // ΑΣΦΑΛΕΙΑ
    { cat: "safety", q: "Ο κίνδυνος σύγκρουσης με επανδρωμένο αεροσκάφος αυξάνεται:", a: ["κατά την πτήση σε ύψος μικρότερο των 120 μέτρων", "κατά την πτήση κοντά σε αεροδρόμια ή ελικοδρόμια", "κατά την πτήση σε πεδινές περιοχές", "κατά την πτήση σε ορεινές περιοχές"], correct: 1, exp: "Τα αεροδρόμια έχουν αυξημένη κίνηση επανδρωμένων σκαφών σε χαμηλό ύψος." },
    { cat: "safety", q: "Τι πρέπει να κάνετε αν δείτε ελικόπτερο να πλησιάζει;", a: ["Να αυξήσετε ύψος", "Να επιταχύνετε", "Προτεραιότητα στο ελικόπτερο και άμεση προσγείωση", "Συνεχίζετε κανονικά"], correct: 2, exp: "Τα επανδρωμένα αεροσκάφη έχουν πάντα προτεραιότητα." },
    // ΚΑΝΟΝΙΣΜΟΙ
    { cat: "regulations", q: "Τι σημαίνει VLOS;", a: ["Οπτική επαφή με το drone", "Σύστημα βίντεο", "Πτήση μέσω GPS", "Αυτόματη πτήση"], correct: 0, exp: "Visual Line of Sight: Ο χειριστής βλέπει το drone με γυμνό μάτι." },
    { cat: "regulations", q: "Ποιο είναι το μέγιστο ύψος πτήσης στην Ανοικτή Κατηγορία;", a: ["50μ", "120μ", "150μ", "500μ"], correct: 1, exp: "Το όριο ασφαλείας είναι τα 120 μέτρα (400 πόδια)." },
    // ΑΝΘΡΩΠΙΝΟΣ ΠΑΡΑΓΟΝΤΑΣ
    { cat: "human", q: "Ποιοι παράγοντες επηρεάζουν την ανθρώπινη απόδοση;", a: ["Υγεία, κούραση, αλκοόλ", "Άγχος, αυτοπεποίθηση", "Φωτισμός, θόρυβος", "Όλα τα παραπάνω"], correct: 3, exp: "Η απόδοση είναι συνδυασμός φυσικής κατάστασης, ψυχολογίας και περιβάλλοντος." },
    { cat: "human", q: "Τι είναι η «επίγνωση της κατάστασης» (Situational Awareness);", a: ["Να βλέπεις το drone", "Αντίληψη περιβάλλοντος και πρόβλεψη μελλοντικής κατάστασης", "Γνώση των κανόνων", "Εμπειρία"], correct: 1, exp: "Είναι η πλήρης κατανόηση του τι συμβαίνει γύρω μας κατά την πτήση." },
    // ΕΠΙΧΕΙΡΗΣΙΑΚΕΣ ΔΙΑΔΙΚΑΣΙΕΣ
    { cat: "ops", q: "Τι ελέγχουμε στις έλικες πριν την πτήση;", a: ["Το χρώμα", "Ρωγμές ή φθορές", "Την μάρκα", "Τίποτα"], correct: 1, exp: "Μια φθαρμένη έλικα μπορεί να σπάσει στον αέρα προκαλώντας πτώση." },
    { cat: "ops", q: "Τι κάνουμε σε περίπτωση Link Loss (Απώλεια σύνδεσης);", a: ["Προσγείωση αμέσως", "Ενεργοποίηση Return to Home (RTH)", "Συνέχιση πτήσης", "Κλείσιμο χειριστηρίου"], correct: 1, exp: "Το σύστημα RTH φέρνει το drone πίσω στην αφετηρία αυτόματα." },
    // ΜΕΤΕΩΡΟΛΟΓΙΑ
    { cat: "weather", q: "Πώς επηρεάζει ο κρύος αέρας την πτήση;", a: ["Αυξάνει την άντωση (πυκνός αέρας)", "Μειώνει την άντωση", "Δεν επηρεάζει", "Μόνο την κάμερα"], correct: 0, exp: "Ο κρύος αέρας είναι πιο πυκνός, παρέχοντας καλύτερη άντωση στις έλικες." },
    { cat: "weather", q: "Τι είναι οι αναταράξεις (turbulence) κοντά σε κτίρια;", a: ["Σταθερός αέρας", "Ακανόνιστες κινήσεις αέρα λόγω εμποδίων", "Άνοδος θερμοκρασίας", "Υγρασία"], correct: 1, exp: "Τα κτίρια διακόπτουν τη ροή του αέρα δημιουργώντας δίνες." },
    // ΙΔΙΩΤΙΚΟΤΗΤΑ
    { cat: "privacy", q: "Επιτρέπεται η δημοσίευση φωτό προσώπων χωρίς συγκατάθεση;", a: ["Ναι, αν είναι πάνω από 50μ", "Όχι (Παραβίαση GDPR)", "Ναι, αν το drone είναι μικρό", "Μόνο αν είναι θολή"], correct: 1, exp: "Η προστασία προσωπικών δεδομένων ισχύει ανεξαρτήτως ύψους." }
];

// Συμπλήρωση ερωτήσεων για επίδειξη (μέχρι 190)
const categories = ["safety", "regulations", "human", "ops", "weather", "privacy"];
while(rawQuestions.length < 190) {
    const c = categories[Math.floor(Math.random() * categories.length)];
    rawQuestions.push({
        cat: c,
        q: `Επαναληπτική Ερώτηση ${rawQuestions.length + 1} για την ενότητα ${c.toUpperCase()}.`,
        a: ["Σωστή Απάντηση", "Λάθος Επιλογή 1", "Λάθος Επιλογή 2", "Λάθος Επιλογή 3"],
        correct: 0,
        exp: "Αυτή είναι μια ερώτηση εξάσκησης για την ενίσχυση των γνώσεών σας."
    });
}

let examSet = [];
let current = 0;
let userAnswers = [];
let startTime = null;
let timerId = null;

function renderHome() {
    if(timerId) clearInterval(timerId);
    document.getElementById("app").innerHTML = `
        <div class="overlay" style="justify-content:center; align-items:center;">
            <div class="main">
                <div class="setup-card">
                    <h1 style="color:var(--primary); font-size:2.5rem; margin-bottom:10px;">Drone Exam Trainer</h1>
                    <p style="margin-bottom:30px; opacity:0.8;">Επιλέξτε τρόπο μελέτης</p>
                    
                    <div class="form-group">
                        <label>Ενότητα Μελέτης</label>
                        <select id="selCat">
                            <option value="random">Τυχαίες (Προσομοίωση Εξέτασης)</option>
                            <option value="safety">Ασφάλεια Πτήσεων</option>
                            <option value="regulations">Κανονισμοί (VLOS, Ύψη)</option>
                            <option value="human">Ανθρώπινος Παράγοντας</option>
                            <option value="ops">Επιχειρησιακές Διαδικασίες</option>
                            <option value="weather">Μετεωρολογία</option>
                            <option value="privacy">Ιδιωτικότητα & GDPR</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Αριθμός Ερωτήσεων</label>
                        <input type="number" id="numQ" value="20" min="5" max="190">
                    </div>

                    <button class="btn btn-primary" style="width:100%; font-size:1.2rem; margin-top:20px;" onclick="startTest()">ΕΝΑΡΞΗ ΤΕΣΤ</button>
                    
                    <p style="margin-top:20px; font-size:0.8rem; opacity:0.6;">Σύνολο διαθέσιμων ερωτήσεων: 190</p>
                </div>
            </div>
        </div>
    `;
}

function startTest() {
    const cat = document.getElementById("selCat").value;
    const num = parseInt(document.getElementById("numQ").value);
    
    let filtered = (cat === "random") ? [...rawQuestions] : rawQuestions.filter(q => q.cat === cat);
    
    // Ανακάτεμα ερωτήσεων
    filtered.sort(() => Math.random() - 0.5);
    
    examSet = filtered.slice(0, num);
    userAnswers = new Array(examSet.length).fill(null);
    current = 0;
    startTime = Date.now();
    
    renderMainLayout();
    renderQuestion();
    startTimer();
}

function renderMainLayout() {
    document.getElementById("app").innerHTML = `
        <div class="overlay">
            <div class="main">
                <div class="top-nav">
                    <button class="btn btn-secondary" onclick="renderHome()">🏠 Αρχική</button>
                    <div class="timer-box" id="clock">00:00</div>
                </div>
                
                <div class="q-container">
                    <div id="qContent"></div>
                </div>

                <div class="action-btns">
                    <button class="btn btn-secondary" onclick="changeQ(-1)">Προηγούμενη</button>
                    <button class="btn btn-secondary" onclick="changeQ(1)">Επόμενη</button>
                    <button class="btn btn-danger" style="margin-left:auto" onclick="confirmFinish()">Τέλος Τεστ</button>
                </div>
            </div>

            <div class="sidebar">
                <h3 style="margin-top:0; font-size:1rem; opacity:0.7;">ΠΡΟΟΔΟΣ</h3>
                <div class="progress-grid" id="dotGrid"></div>
                <div style="margin-top:30px; font-size:0.8rem; line-height:1.6;">
                    <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; background:var(--success); border-radius:2px;"></div> Σωστό</div>
                    <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; background:var(--danger); border-radius:2px;"></div> Λάθος</div>
                    <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; background:#333; border:1px solid var(--primary); border-radius:2px;"></div> Τρέχουσα</div>
                </div>
            </div>
        </div>
    `;
}

function renderQuestion() {
    const q = examSet[current];
    const container = document.getElementById("qContent");
    
    let html = `
        <div style="margin-bottom:10px; color:var(--primary); font-weight:bold; font-size:0.9rem; text-transform:uppercase;">
            Ενότητα: ${q.cat} | Ερώτηση ${current + 1} από ${examSet.length}
        </div>
        <h2 style="margin-top:0; line-height:1.4;">${q.q}</h2>
        <div class="ans-grid">
    `;

    q.a.forEach((opt, i) => {
        let stateClass = "";
        let isSelected = userAnswers[current] === i;
        let hasAnswered = userAnswers[current] !== null;

        if (hasAnswered) {
            if (i === q.correct) stateClass = "correct";
            else if (isSelected) stateClass = "wrong";
        }

        html += `
            <button class="ans-btn ${stateClass}" ${hasAnswered ? 'disabled' : ''} onclick="handleAnswer(${i})">
                ${opt}
            </button>
        `;
    });

    html += `</div>`;

    // Εμφάνιση επεξήγησης αν απαντήθηκε λάθος
    if (userAnswers[current] !== null && userAnswers[current] !== q.correct) {
        html += `
            <div class="explanation">
                <strong>💡 Γιατί;</strong><br>
                ${q.exp}
            </div>
        `;
    }

    container.innerHTML = html;
    updateDots();
}

function handleAnswer(index) {
    userAnswers[current] = index;
    renderQuestion();
}

function changeQ(dir) {
    let next = current + dir;
    if (next >= 0 && next < examSet.length) {
        current = next;
        renderQuestion();
    }
}

function updateDots() {
    const grid = document.getElementById("dotGrid");
    grid.innerHTML = "";
    examSet.forEach((_, i) => {
        const dot = document.createElement("div");
        dot.className = "dot";
        if (i === current) dot.classList.add("active");
        
        if (userAnswers[i] !== null) {
            dot.classList.add(userAnswers[i] === examSet[i].correct ? "done-correct" : "done-wrong");
        }
        
        dot.innerText = i + 1;
        dot.onclick = () => { current = i; renderQuestion(); };
        grid.appendChild(dot);
    });
}

function startTimer() {
    timerId = setInterval(() => {
        const clock = document.getElementById("clock");
        if (!clock) return;
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(diff / 60)).padStart(2, '0');
        const s = String(diff % 60).padStart(2, '0');
        clock.innerText = `${m}:${s}`;
    }, 1000);
}

function confirmFinish() {
    const unanswered = userAnswers.filter(a => a === null).length;
    let msg = "Είστε σίγουροι ότι θέλετε να τερματίσετε το τεστ;";
    if (unanswered > 0) msg += `\nΈχετε ${unanswered} αναπάντητες ερωτήσεις.`;
    
    if (confirm(msg)) finish();
}

function finish() {
    clearInterval(timerId);
    const correctCount = userAnswers.filter((a, i) => a === examSet[i].correct).length;
    const score = Math.round((correctCount / examSet.length) * 100);
    const timeTaken = document.getElementById("clock").innerText;

    document.getElementById("app").innerHTML = `
        <div class="overlay" style="justify-content:center; align-items:center; text-align:center;">
            <div class="main" style="max-width:600px;">
                <div class="setup-card">
                    <div style="font-size:4rem; margin-bottom:20px;">${score >= 75 ? '🎉' : '⚠️'}</div>
                    <h1 style="margin-bottom:10px;">Αποτέλεσμα: ${score}%</h1>
                    <p style="font-size:1.2rem; opacity:0.8; margin-bottom:30px;">
                        ${score >= 75 ? 'Συγχαρητήρια! Περάσατε τη βάση.' : 'Χρειάζεται λίγη ακόμα μελέτη.'}
                    </p>
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:40px; text-align:left;">
                        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px;">
                            <small style="opacity:0.6;">ΣΩΣΤΕΣ</small><br>
                            <span style="font-size:1.5rem; font-weight:bold; color:var(--success);">${correctCount} / ${examSet.length}</span>
                        </div>
                        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px;">
                            <small style="opacity:0.6;">ΧΡΟΝΟΣ</small><br>
                            <span style="font-size:1.5rem; font-weight:bold; color:var(--warning);">${timeTaken}</span>
                        </div>
                    </div>

                    <button class="btn btn-primary" style="width:100%" onclick="renderHome()">ΝΕΟ ΤΕΣΤ</button>
                </div>
            </div>
        </div>
    `;
}

window.onload = renderHome;
</script>
</body>
</html>
